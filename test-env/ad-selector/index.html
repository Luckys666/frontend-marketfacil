<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Selecione um anúncio para analisar — MarketFácil</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=DM+Sans:opsz,wght@9..40,400;9..40,500;9..40,700&family=DM+Mono:wght@400;500&display=swap" rel="stylesheet">
<style>
/* ===== Proposta U — Light Trading (tokens espelhados de css/analyzer.css) ===== */
:root {
  --bg: #f4f6fa; --bg-card: #ffffff; --navy: #0f172a;
  --blue: #0066ff; --blue-light: #e8f0ff;
  --green: #00d68f; --green-light: #e6fbf3; --green-dark: #059669;
  --yellow: #f59e0b; --yellow-light: #fef3c7;
  --red: #ff3b5c; --red-light: #fff0f2; --red-dark: #dc2626;
  --orange: #ea580c; --orange-light: #fff1e6;
  --text: #0f172a; --text-secondary: #475569; --text-muted: #94a3b8;
  --border: #e2e8f0; --row-alt: #f8fafc; --row-hover: #e8f0ff;
  --shadow-sm: 0 1px 3px rgba(0,0,0,0.06);
  --shadow-md: 0 4px 12px rgba(0,0,0,0.08);
  --radius: 10px; --radius-sm: 6px;
}
* { box-sizing: border-box; }
html, body { margin: 0; padding: 0; }
body {
  font-family: 'DM Sans', 'Geist', -apple-system, BlinkMacSystemFont, sans-serif;
  color: var(--text); line-height: 1.5;
  background-color: var(--bg);
  -webkit-font-smoothing: antialiased;
}
.mono {
  font-family: 'DM Mono', 'Geist Mono', 'Consolas', monospace;
  font-variant-numeric: tabular-nums;
}
.wrap { max-width: 1180px; margin: 0 auto; padding: 28px 20px 64px; }
/* telas largas: a tabela (com coluna Vendas) precisa de mais respiro pra caber sem scroll horizontal */
@media (min-width: 1320px) { .wrap { max-width: 1330px; } }

/* ── Header ── */
.hdr { margin-bottom: 22px; }
.hdr h1 { font-size: 1.55rem; font-weight: 700; margin: 0 0 4px; letter-spacing: -0.01em; }
.hdr p { margin: 0; color: var(--text-secondary); font-size: 0.95rem; }

/* ── Cards ── */
.card {
  background: var(--bg-card); border: 1px solid var(--border);
  border-radius: var(--radius); box-shadow: var(--shadow-sm);
  margin-bottom: 16px;
}
.card-pad { padding: 16px 18px; }
.section-label {
  font-size: 0.72rem; font-weight: 700; text-transform: uppercase;
  letter-spacing: 0.08em; color: var(--text-muted); margin: 0 0 12px;
}

/* ── Chips de problema ── */
.chips { display: flex; flex-wrap: wrap; gap: 9px; }
.chip {
  display: inline-flex; align-items: center; gap: 7px;
  padding: 8px 13px; border-radius: 999px; cursor: pointer;
  border: 1px solid var(--border); background: var(--bg);
  font-family: inherit; font-size: 0.86rem; font-weight: 500; color: var(--text);
  transition: all .12s ease; white-space: nowrap;
}
.chip:hover { border-color: var(--blue); background: var(--blue-light); }
.chip .chip-emoji { font-size: 0.95rem; line-height: 1; }
/* indicador de severidade flat (estilo LED de status) — substitui as bolinhas emoji */
.chip-ind {
  display: inline-block; width: 9px; height: 9px; border-radius: 2px; flex-shrink: 0;
  vertical-align: middle;
}
.chip-ind.sev-red    { background: var(--red);    box-shadow: 0 0 0 3px var(--red-light); }
.chip-ind.sev-orange { background: var(--orange); box-shadow: 0 0 0 3px var(--orange-light); }
.chip-ind.sev-yellow { background: var(--yellow); box-shadow: 0 0 0 3px var(--yellow-light); }
.chip-ind.sev-gray   { background: var(--text-muted); box-shadow: 0 0 0 3px var(--row-alt); }
.chip.active .chip-ind { box-shadow: 0 0 0 3px rgba(255,255,255,0.3); }
.chip .chip-count {
  font-family: 'DM Mono', monospace; font-weight: 500; font-size: 0.8rem;
  background: var(--navy); color: #fff; border-radius: 999px;
  padding: 1px 8px; min-width: 22px; text-align: center;
}
.chip.active { border-color: var(--blue); background: var(--blue); color: #fff; }
.chip.active .chip-count { background: rgba(255,255,255,0.25); color: #fff; }
.chips-clean {
  display: flex; align-items: center; gap: 8px;
  color: var(--green-dark); font-weight: 500; font-size: 0.92rem;
}
.chips-tip { font-size: 0.8rem; color: var(--text-secondary); margin: 8px 0 0; }
.chips-skel { display: flex; gap: 9px; }
.chips-skel span {
  width: 150px; height: 34px; border-radius: 999px;
  background: linear-gradient(90deg, var(--row-alt) 25%, #eef2f7 50%, var(--row-alt) 75%);
  background-size: 200% 100%; animation: shimmer 1.4s infinite;
}
@keyframes shimmer { 0% { background-position: 200% 0; } 100% { background-position: -200% 0; } }

/* ── Barra de filtros ── */
.filters { display: flex; flex-wrap: wrap; align-items: center; gap: 10px; }
.search-box {
  position: relative; flex: 1 1 280px; min-width: 220px;
}
.search-box input {
  width: 100%; padding: 9px 12px 9px 36px;
  border: 1px solid var(--border); background: var(--bg);
  border-radius: var(--radius-sm); font-family: inherit; font-size: 0.92rem;
  color: var(--text); transition: border-color .12s;
}
.search-box input:focus { outline: none; border-color: var(--blue); background: #fff; }
.search-box .ico {
  position: absolute; left: 12px; top: 50%; transform: translateY(-50%);
  color: var(--text-muted); font-size: 0.95rem;
  border: none; background: transparent; cursor: pointer;
  padding: 10px; margin: 0 0 0 -10px; line-height: 1;
}
.btn-group { display: inline-flex; border: 1px solid var(--border); border-radius: var(--radius-sm); overflow: hidden; }
.btn-group button {
  padding: 8px 14px; border: none; background: var(--bg-card);
  font-family: inherit; font-size: 0.86rem; font-weight: 500; color: var(--text-secondary);
  cursor: pointer; border-right: 1px solid var(--border); transition: all .1s;
}
.btn-group button:last-child { border-right: none; }
.btn-group button:hover { background: var(--row-alt); }
.btn-group button.on { background: var(--blue); color: #fff; }
.sel {
  padding: 8px 12px; border: 1px solid var(--border); background: var(--bg-card);
  border-radius: var(--radius-sm); font-family: inherit; font-size: 0.86rem;
  color: var(--text); cursor: pointer;
}
.sel:focus { outline: none; border-color: var(--blue); }
.btn-clear {
  padding: 8px 12px; border: 1px solid var(--border); background: var(--bg-card);
  border-radius: var(--radius-sm); font-family: inherit; font-size: 0.84rem;
  color: var(--red); cursor: pointer; transition: all .1s;
}
.btn-clear:hover { background: var(--red-light); border-color: var(--red); }
/* no desktop o wrapper dos filtros secundários é transparente (layout inalterado);
   no mobile ele colapsa atrás do botão "Filtrar e ordenar" */
.filters-more { display: contents; }
.btn-filters-toggle { display: none; }

/* ── Tabela ── */
.tbl-card { overflow: hidden; }
/* overflow-x só em telas estreitas — em telas largas (>=1346px) a tabela cabe inteira e o thead sticky engata no scroll da página */
@media (max-width: 1345px) { .tbl-wrap { overflow-x: auto; } }
table.grid { width: 100%; border-collapse: collapse; font-size: 0.9rem; }
table.grid thead th {
  position: sticky; top: 0; z-index: 2;
  background: var(--navy); color: #fff;
  text-align: left; font-weight: 600; font-size: 0.72rem;
  text-transform: uppercase; letter-spacing: 0.06em;
  padding: 11px 10px; white-space: nowrap;
}
table.grid thead th.th-wrap { white-space: normal; min-width: 68px; }
/* Sinais precisa de faixa garantida — senão a coluna Anúncio engole a largura e os
   badges empilham 3+ dobras (linha alta = menos anúncios na tela). Mantém IGUAL à
   largura fixa do .badges: coluna estável, tabela não muda ao expandir. */
table.grid thead th.th-sinais { min-width: 330px; }
table.grid th.num, table.grid td.num { text-align: right; white-space: nowrap; }
/* top-align: o valor primário de cada célula fica na MESMA altura em toda a linha —
   sem o zigzag horizontal que o middle criava quando vizinhos têm sublinhas (P2) */
table.grid tbody td { padding: 9px 10px 7px; border-bottom: 1px solid var(--border); vertical-align: top; }
table.grid tbody tr:nth-child(even) { background: var(--row-alt); }
table.grid tbody tr { cursor: pointer; transition: background .1s; }
table.grid tbody tr:hover { background: var(--row-hover); }
table.grid tbody tr.selected { background: var(--blue-light); box-shadow: inset 3px 0 0 var(--blue); }
.thumb {
  width: 56px; height: 56px; border-radius: var(--radius-sm);
  object-fit: cover; background: var(--row-alt); border: 1px solid var(--border);
  display: block;
}
.cell-id { color: var(--text-muted); font-size: 0.75rem; }
.cell-title { max-width: 300px; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; font-weight: 500; }
/* título + ID empilhados na mesma célula (caret de família à esquerda quando houver) */
.cell-main { display: flex; align-items: center; }
.cell-text { min-width: 0; }
/* flex-wrap: em coluna estreita os ícones/ID quebram pra linha de baixo em vez de
   vazar pra fora da célula (vazamento pego pelo mfLayoutCheck em ~1050px) */
.row-id { display: flex; flex-wrap: wrap; align-items: center; gap: 2px; margin-top: 1px; line-height: 1.3; max-width: 100%; }
.cell-price { font-weight: 500; }
.cell-stock { color: var(--text-secondary); }
.cell-stock.low { color: var(--red); font-weight: 500; }
/* colunas numéricas encolhem no conteúdo — espaço livre vai pro título e sinais */
table.grid th.fit, table.grid td.fit { width: 1%; }
/* estoque + estimativa de duração empilhados, alinhados à direita */
.stock-wrap { display: inline-flex; flex-direction: column; align-items: flex-end; }
.stock-days { font-size: 0.72rem; color: var(--text-muted); font-weight: 400; cursor: help; white-space: nowrap; }
/* taxa de conversão 30d sob o nº de visitas — um degrau acima do "≈ dias" (P13):
   é métrica de decisão, não metadado */
.conv-rate { font-size: 0.72rem; color: var(--text-secondary); font-weight: 500; cursor: help; white-space: nowrap; }
/* números das sublinhas em tabular: sem "tremor" vertical entre linhas (P13) */
.conv-rate, .stock-days, .price-orig { font-variant-numeric: tabular-nums; }
/* minigráfico de tendência ao lado do nº de visitas; nº com largura fixa alinha a "lane"
   dos sparks entre as linhas (P3) */
.visits-line { display: inline-flex; align-items: center; gap: 6px; cursor: help; }
.visits-line .spark { display: block; flex-shrink: 0; }
.visits-line .cell-stock { display: inline-block; min-width: 4ch; text-align: right; }
/* marcador especial de anúncio de catálogo — junto do título, não é badge de sinal.
   Ghost (P8 do design review): navy sólido roubava peso da severidade; "é catálogo"
   é identidade, não alarme — o navy 100% fica pro cabeçalho e pros contadores. */
.tag-catalog {
  display: inline-flex; align-items: center;
  background: transparent; color: var(--navy); border: 1px solid var(--border); border-radius: 4px;
  padding: 0 6px; margin-right: 6px;
  font-size: 0.64rem; font-weight: 700; text-transform: uppercase; letter-spacing: 0.06em;
  cursor: help; flex-shrink: 0;
}
/* Largura FIXA (não max-): a coluna Sinais não muda quando famílias/vinculados
   expandem — sub-linha com badges largos alargava a tabela e o botão sticky
   cobria a ponta ("cortado"). Rótulo longo QUEBRA pra próxima linha dentro da
   faixa, nunca some no meio da palavra (P5). */
.badges { display: flex; flex-wrap: wrap; gap: 3px 12px; align-items: center; width: 330px; }
/* Sinal = indicador LED + texto flat (mesma linguagem dos chips do resumo) —
   sem fundo colorido por sinal: o quadradinho carrega a severidade, o texto fica
   neutro e a coluna deixa de parecer um arco-íris de pills */
.badge {
  display: inline-flex; align-items: center; gap: 5px;
  padding: 1px 0; border-radius: 4px;
  font-size: 0.74rem; font-weight: 500; white-space: nowrap; line-height: 1.5;
  color: var(--text-secondary); background: transparent;
}
.badge::before { content: ''; width: 7px; height: 7px; border-radius: 2px; flex-shrink: 0; }
.badge.red::before    { background: var(--red); }
.badge.orange::before { background: var(--orange); }
.badge.yellow::before { background: var(--yellow); }
.badge.gray::before   { background: var(--text-muted); }
.badge.blue::before   { background: var(--blue); }
.badge.green::before  { background: var(--green); }
/* severidade alta ganha texto colorido pra ranquear o olho (contraste AA mantido) */
.badge.red    { color: var(--red-dark); font-weight: 600; }
.badge.orange { color: #c2410c; font-weight: 600; }
.badge.yellow { color: #b45309; }
.badge.green  { color: var(--green-dark); }
/* Ações continuam PILLS (clicável precisa parecer clicável): variações, vinculados, +N */
.badge.variations, .badge-more {
  padding: 2px 9px; border-radius: 999px; font-weight: 600; font-size: 0.72rem;
  gap: 4px;
}
.badge.variations::before, .badge-more::before { display: none; }
.badge-more { cursor: pointer; user-select: none; background: transparent; color: var(--blue); border: 1px solid #c9dcff; }
/* dica "o que fazer" aberta por toque num badge (mobile) — inserida logo após .badges */
.badge-hint {
  flex-basis: 100%; font-size: 0.78rem; color: var(--text-secondary);
  background: var(--row-alt); border-radius: 6px; padding: 8px 10px; margin-top: 6px;
}
/* botão "Analisar" fixo na borda direita: em janela estreita (tabela com scroll
   horizontal) ele continua visível por cima do conteúdo rolado — sinais nunca
   atropelam o botão. Precisa de fundo sólido por linha (zebra/hover/selected). */
.analyze-cell { width: 1%; white-space: nowrap; text-align: right; position: sticky; right: 0; background: var(--bg-card); }
table.grid tbody tr:nth-child(even) .analyze-cell { background: var(--row-alt); }
table.grid tbody tr:hover .analyze-cell { background: var(--row-hover); }
table.grid tbody tr.selected .analyze-cell { background: var(--blue-light); }
table.grid tbody tr.subrow .analyze-cell { background: #fbfdff; }
.btn-analyze {
  padding: 5px 10px; border: 1.5px solid var(--blue); background: #fff;
  color: var(--blue); border-radius: var(--radius-sm); font-family: inherit;
  font-size: 0.78rem; font-weight: 600; cursor: pointer;
  opacity: 1; transition: background .12s;
}
table.grid tbody tr:hover .btn-analyze { opacity: 1; }
.btn-analyze:hover { background: var(--blue); color: #fff; }
/* touch (sem hover) e navegação por teclado: o botão nunca parece desabilitado */
@media (hover: none) { .btn-analyze { opacity: 1; } }
.btn-analyze:focus-visible { opacity: 1; }

/* ── Loading orbital (espelhado de analyzer.css .comp-loading) ── */
.comp-loading {
  display: flex; flex-direction: column; align-items: center; justify-content: center;
  padding: 48px 24px 40px; gap: 16px;
}
.comp-orbital { position: relative; width: 56px; height: 56px; flex-shrink: 0; }
.comp-orbital-ring { position: absolute; inset: 0; border-radius: 50%; border: 3px solid transparent; }
.comp-orbital-ring:nth-child(1) { border-top-color: var(--blue); border-right-color: var(--blue); animation: comp-spin-f .75s linear infinite; }
.comp-orbital-ring:nth-child(2) { inset: 10px; border-bottom-color: var(--green); border-left-color: var(--green); animation: comp-spin-f 1.1s linear infinite reverse; }
.comp-orbital-dot { position: absolute; top: 50%; left: 50%; transform: translate(-50%,-50%); width: 8px; height: 8px; border-radius: 50%; background: var(--blue); animation: comp-pulse 1.2s ease-in-out infinite; }
@keyframes comp-spin-f { to { transform: rotate(360deg); } }
@keyframes comp-pulse { 0%,100% { transform: translate(-50%,-50%) scale(.7); opacity:.4; } 50% { transform: translate(-50%,-50%) scale(1); opacity:1; } }
.comp-loading-msg { color: var(--text); font-weight: 700; font-size: 1rem; margin: 0; text-align: center; }
.comp-loading-bar { width: 280px; height: 4px; background: var(--border); border-radius: 2px; overflow: hidden; }
.comp-loading-bar-fill { height: 100%; width: 45%; background: linear-gradient(90deg, transparent, var(--blue), var(--green), transparent); animation: comp-sweep 1.6s ease-in-out infinite; }
@keyframes comp-sweep { 0% { transform: translateX(-222%); } 100% { transform: translateX(333%); } }

/* ── Estados: vazio / erro / aviso ── */
.state { padding: 44px 24px; text-align: center; color: var(--text-secondary); }
.state .emoji { font-size: 2rem; display: block; margin-bottom: 10px; }
.state h3 { margin: 0 0 6px; color: var(--text); font-size: 1.05rem; }
.state p { margin: 0; font-size: 0.92rem; }
.state .btn-retry {
  margin-top: 14px; padding: 8px 16px; border: 1px solid var(--blue); background: var(--blue);
  color: #fff; border-radius: var(--radius-sm); font-family: inherit; font-weight: 600; cursor: pointer;
}
.banner {
  display: flex; align-items: center; gap: 8px;
  padding: 10px 14px; border-radius: var(--radius-sm); font-size: 0.88rem;
  margin: 0 0 12px;
}
.banner.warn { background: var(--yellow-light); color: #92400e; border: 1px solid #fde68a; }
/* #0052cc (mesmo tom do hover do .btn-open-app): contraste ~5,5:1 sobre o fundo azul-claro */
.banner.info { background: var(--blue-light); color: #0052cc; border: 1px solid #c7ddff; }
.chip-clear-link { background: none; border: none; padding: 10px 4px; margin: -10px 0; color: var(--blue); font-family: inherit; font-size: inherit; font-weight: 600; text-decoration: underline; cursor: pointer; }

/* ── Paginação ── */
.pager { display: flex; align-items: center; justify-content: space-between; gap: 14px; padding: 14px 18px; flex-wrap: wrap; }
.pager-info { font-size: 0.86rem; color: var(--text-secondary); }
.pager-info b { color: var(--text); font-family: 'DM Mono', monospace; font-weight: 500; }
.pager-progress { flex: 1 1 140px; max-width: 240px; height: 4px; background: var(--border); border-radius: 2px; overflow: hidden; }
.pager-progress span { display: block; height: 100%; background: var(--blue); border-radius: 2px; transition: width .2s; }
.pager-btns { display: flex; gap: 8px; }
.pager-btns button {
  padding: 7px 14px; border: 1px solid var(--border); background: var(--bg-card);
  border-radius: var(--radius-sm); font-family: inherit; font-size: 0.86rem; font-weight: 500;
  color: var(--text); cursor: pointer; transition: all .1s;
}
.pager-btns button:hover:not(:disabled) { border-color: var(--blue); color: var(--blue); }
.pager-btns button:disabled { opacity: 0.4; cursor: not-allowed; }

/* ── Cabeçalho dos chips + botão refresh ── */
.chips-head { display: flex; align-items: center; justify-content: space-between; margin-bottom: 12px; }
.chips-head .section-label { margin: 0; }
.icon-btn {
  border: 1px solid var(--border); background: var(--bg-card); color: var(--text-secondary);
  width: auto; height: 30px; padding: 0 10px; font-size: 0.8rem; border-radius: var(--radius-sm); cursor: pointer;
  line-height: 1; transition: all .12s;
}
.icon-btn:hover { border-color: var(--blue); color: var(--blue); }
.icon-btn:disabled { opacity: .5; cursor: default; }
.icon-btn.spin { animation: comp-spin-f .6s linear; }

/* ── Botão exportar CSV ── */
.btn-export {
  padding: 8px 14px; border: 1px solid var(--green); background: var(--green-light);
  color: var(--green-dark); border-radius: var(--radius-sm); font-family: inherit;
  font-size: 0.84rem; font-weight: 600; cursor: pointer; transition: all .1s; white-space: nowrap;
}
.btn-export:hover { background: var(--green); color: #fff; }

/* ── Quick-filters (client-side) ── */
.quick-filters { display: flex; align-items: center; gap: 10px; margin-top: 12px; flex-wrap: wrap; }
.chip-sm { padding: 6px 12px; font-size: 0.82rem; }
.chip-sm.active { border-color: var(--blue); background: var(--blue); color: #fff; }
.quick-hint { font-size: 0.8rem; color: #b45309; font-weight: 500; }

/* ── Preço com desconto ── */
.price-orig { color: var(--text-muted); text-decoration: line-through; font-size: 0.78rem; display: block; }
/* pill de desconto em linha própria, colada à direita: o preço fica sozinho na linha dele
   e a coluna não alarga — todos os preços da tabela alinham na mesma borda */
.badge-off {
  display: block; width: max-content; margin: 0 0 1px auto; padding: 1px 6px; border-radius: 4px;
  background: var(--green-light); color: #047857; font-size: 0.7rem; font-weight: 700;
}

/* ── Linha-produto (família agrupada) ── */
/* seta maior no glifo, mais magra no espaço (padding 12→8, gutter 8→4) */
.caret { cursor: pointer; color: var(--text-secondary); font-size: 1.1rem; user-select: none; transition: transform .15s; display: inline-block; padding: 8px; margin: -8px 4px -8px -8px; line-height: 1; }
.caret.open { transform: rotate(90deg); }
/* pills de ação em GHOST (borda fina, sem preenchimento): param de vencer o vermelho
   da severidade no scan da coluna (P1 do design review) */
.badge.variations { background: transparent; color: var(--blue); border: 1px solid #c9dcff; cursor: pointer; }
tr.subrow { background: #fbfdff !important; }
tr.subrow td { border-bottom: 1px dashed var(--border); }
tr.subrow .cell-main { padding-left: 22px; }
tr.subrow .cell-title { color: var(--text-secondary); }
/* variação: mostra o fim do título (— Tam P, — 38) QUEBRANDO linha (sem ellipsis).
   max-width segura a coluna: título sem teto alargava a tabela na expansão e o
   botão sticky cobria os sinais. */
tr.subrow .cell-title { max-width: 300px; white-space: normal; }
.btn-analyze-var {
  padding: 4px 10px; border: 1px solid var(--border); background: #fff; color: var(--blue);
  border-radius: var(--radius-sm); font-family: inherit; font-size: 0.76rem; font-weight: 600; cursor: pointer;
}
.btn-analyze-var:hover { border-color: var(--blue); background: var(--blue-light); }

/* ── Ícones de ação junto do ID (copiar / abrir no ML) — sempre visíveis, discretos ── */
.id-actions { display: inline-flex; align-items: center; gap: 4px; margin-left: 4px; opacity: .55; transition: opacity .12s; }
tr:hover .id-actions { opacity: 1; }
.id-act { cursor: pointer; font-size: 0.82rem; color: var(--text-secondary); text-decoration: none; display: inline-flex; align-items: center; }
.id-act svg { display: block; }
.id-act:hover { color: var(--blue); }
.id-copied { color: var(--green-dark); font-weight: 600; font-size: 0.72rem; margin-left: 6px; }

/* ── Fluxo integrado: barra de análise + placeholder ── */
#analysisView { animation: fadeIn .18s ease; }
.analysis-bar {
  position: sticky; top: 0; z-index: 10; display: flex; align-items: center; gap: 12px;
  background: var(--bg-card); border: 1px solid var(--border); border-radius: var(--radius);
  box-shadow: var(--shadow-sm); padding: 12px 16px; margin-bottom: 16px;
}
.analysis-back {
  border: 1px solid var(--border); background: var(--bg); color: var(--text);
  border-radius: var(--radius-sm); padding: 8px 14px; font-family: inherit; font-weight: 600;
  font-size: 0.88rem; cursor: pointer; white-space: nowrap; transition: all .1s;
}
.analysis-back:hover { border-color: var(--blue); color: var(--blue); }
.analysis-bar .thumb { width: 38px; height: 38px; }
.analysis-bar .ab-meta { display: flex; flex-direction: column; min-width: 0; }
.analysis-bar .ab-id { font-family: 'DM Mono', monospace; font-size: 0.76rem; color: var(--text-muted); }
.analysis-bar .ab-title { font-weight: 600; font-size: 0.92rem; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
.analysis-placeholder {
  background: var(--bg-card); border: 1px dashed var(--border); border-radius: var(--radius);
  padding: 48px 28px; text-align: center; color: var(--text-secondary);
}
.analysis-placeholder .emoji { font-size: 2rem; display: block; margin-bottom: 12px; }
.analysis-placeholder h3 { margin: 0 0 8px; color: var(--text); }
.analysis-placeholder p { margin: 0 auto 18px; max-width: 460px; font-size: 0.92rem; }
.btn-open-app {
  padding: 10px 20px; border: none; background: var(--blue); color: #fff; border-radius: var(--radius-sm);
  font-family: inherit; font-weight: 700; font-size: 0.92rem; cursor: pointer;
}
.btn-open-app:hover { background: #0052cc; }

/* ── Mobile: tabela vira cards ──
   (no FIM do <style> de propósito: as regras mobile precisam vencer a cascata
   sobre as regras base declaradas acima — não mover de volta pra cima) */
/* ── Tier compacto 721–1345px (janela estreita / Windows com escala 125%) ──
   Sem isto a tabela (≈1278px) rolava horizontalmente e o botão sticky COBRIA a
   coluna Sinais ("sinais cortados"). Aqui a tabela emagrece pra caber inteira:
   foto 44, sem sparkline, padding menor — e Título/Sinais com largura FLUIDA
   pelo viewport (clamp): encolhem junto com a janela em QUALQUER largura do
   tier, e como dependem da janela (não do conteúdo), expandir família/vinculados
   continua sem mudar a largura da tabela. Piso do clamp ≈ janela de 910px;
   abaixo disso rola com a sombra do botão como pista. Constantes com ~20px de
   folga pra barra de rolagem clássica do Windows (vw inclui a barra). */
@media (min-width: 721px) and (max-width: 1345px) {
  .wrap { padding-left: 14px; padding-right: 14px; }
  .thumb { width: 44px; height: 44px; }
  .visits-line .spark { display: none; }
  .cell-title { max-width: clamp(104px, 42vw - 289px, 190px); }
  tr.subrow .cell-title { max-width: clamp(104px, 42vw - 289px, 190px); }
  table.grid thead th.th-sinais { min-width: 165px; }
  .badges { width: clamp(165px, 58vw - 404px, 258px); }
  /* badge individual nunca vaza da faixa: se for mais largo que a coluna mínima,
     o TEXTO quebra dentro do badge (só acontece em janela < ~1000px) */
  .badge { max-width: 100%; white-space: normal; }
  .btn-analyze-var { padding: 4px 8px; }
  table.grid tbody td { padding-left: 7px; padding-right: 7px; }
  table.grid thead th { padding-left: 7px; padding-right: 7px; }
  .btn-analyze { padding: 5px 8px; }
  /* se AINDA rolar (janela < ~1030px), o botão sticky ganha sombra à esquerda:
     fica claro que há conteúdo passando por baixo (affordance de rolagem) */
  .analyze-cell { box-shadow: -10px 0 10px -10px rgba(15, 23, 42, 0.25); }
}

@media (max-width: 720px) {
  .wrap { padding: 18px 12px 48px; }
  table.grid thead { display: none; }
  table.grid, table.grid tbody, table.grid tr, table.grid td { display: block; width: 100%; }
  table.grid tbody tr {
    border: 1px solid var(--border); border-radius: var(--radius);
    margin-bottom: 10px; padding: 10px 12px; background: var(--bg-card) !important;
    box-shadow: var(--shadow-sm); position: relative;
  }
  table.grid tbody tr.selected { box-shadow: inset 0 0 0 2px var(--blue); }
  table.grid tbody td { border: none; padding: 4px 0; display: flex; justify-content: space-between; gap: 12px; }
  table.grid tbody td::before {
    content: attr(data-label); font-weight: 600; font-size: 0.72rem;
    text-transform: uppercase; letter-spacing: 0.05em; color: var(--text-secondary);
    flex-shrink: 0;
  }
  table.grid tbody td.td-photo { justify-content: flex-start; }
  table.grid tbody td.td-photo::before { display: none; }
  .cell-title { max-width: none; white-space: normal; text-align: right; }
  .badges { width: auto; max-width: none; justify-content: flex-end; }
  /* CTA sólido no mobile (P4): sem hover, o ghost lia como desabilitado */
  .btn-analyze { opacity: 1; width: 100%; padding: 12px; min-height: 44px; margin-top: 4px; background: var(--blue); color: #fff; border-color: var(--blue); }
  .analyze-cell { text-align: center; }
  .analyze-cell::before { display: none; }
  .filters .sel, .filters .btn-export { flex: 1 1 46%; }
  /* exportar vira ação secundária no fim dos filtros (encurta o caminho até o 1º anúncio) */
  .filters .btn-export { order: 99; flex: 1 1 100%; background: var(--bg-card); border-color: var(--border); color: var(--text-secondary); }
  /* controles secundários colapsam atrás de "Filtrar e ordenar" — 1º anúncio na 1ª dobra */
  .btn-filters-toggle { display: block; flex: 1 1 100%; min-height: 44px; padding: 12px; border: 1px solid var(--border); background: var(--bg-card); border-radius: var(--radius-sm); font-family: inherit; font-size: 0.88rem; font-weight: 600; color: var(--text); }
  .btn-filters-toggle.has-active { border-color: var(--blue); color: var(--blue); }
  .filters-card:not(.open) .filters-more { display: none; }
  .filters-card:not(.open) .quick-filters { display: none; }
  /* resumo da conta vira carrossel de 1 linha */
  .chips { flex-wrap: nowrap; overflow-x: auto; -webkit-overflow-scrolling: touch; padding-bottom: 4px; scroll-snap-type: x proximity; }
  .chips .chip { flex: 0 0 auto; scroll-snap-align: start; }
  /* ações de copiar/abrir sempre visíveis + alvo de toque maior
     (seletor com table.grid pra vencer a regra base .id-actions{opacity:0}) */
  table.grid .id-actions { opacity: 1; }
  .id-act { display: inline-block; padding: 14px 12px; margin: -14px 0; }
  .pager-btns button { padding: 11px 18px; min-height: 44px; }
  /* alvos de toque ~44px nos controles (chips compactos: ~2 inteiros + peek em 360px) */
  .chip { padding: 12px 10px; min-height: 44px; font-size: 0.8rem; }
  .btn-group button { padding: 12px 14px; }
  .sel { padding: 12px; }
  .search-box input { padding: 12px 12px 12px 38px; }
  /* 16px no foco: elimina o auto-zoom do Safari/Chrome iOS sem bloquear o pinch-zoom */
  .search-box input, .sel { font-size: 1rem; }
  .search-box .ico { padding: 14px; margin: 0 0 0 -14px; }
  .icon-btn { width: auto; height: 44px; padding: 0 14px; }
  .badge.variations, .badge-more { padding: 12px 14px; margin: -6px 0; font-size: 0.8rem; }
  /* sinais no card: alvo de toque decente (cada badge abre a dica "o que fazer") — P10 */
  .badges { gap: 6px 14px; }
  .badge { min-height: 38px; }
  /* sparkline sai do card (P3): em 390px vira ruído — a tendência fica pra análise */
  .visits-line .spark { display: none; }
  /* ID discreto no card (P11): o vendedor triage por foto+título+sinais; o ID copia quando precisa */
  .row-id { opacity: .8; }
  .row-id .cell-id { font-size: 0.7rem; }
  /* pista de que o carrossel de chips continua (P14): fade na borda direita */
  .chips { -webkit-mask-image: linear-gradient(90deg, #000 88%, transparent); mask-image: linear-gradient(90deg, #000 88%, transparent); }
  /* a pill "N variações ▾" já é o controle óbvio de expandir — a setinha do ID é ruído com alvo pequeno */
  .caret { display: none; }
  /* card abre com foto e título, não com o ID */
  table.grid tbody tr { display: flex; flex-direction: column; }
  table.grid tbody td.td-photo { order: -2; }
  table.grid tbody td[data-label="Título"], table.grid tbody td[data-label="Variação"], table.grid tbody td[data-label="Vinculado"] { order: -1; }
  table.grid tbody td[data-label="Título"]::before, table.grid tbody td[data-label="Variação"]::before, table.grid tbody td[data-label="Vinculado"]::before { display: none; }
  table.grid tbody td[data-label="Título"] .cell-title, table.grid tbody td[data-label="Variação"] .cell-title, table.grid tbody td[data-label="Vinculado"] .cell-title { text-align: left; font-weight: 600; font-size: 1rem; }
  /* sinais sobem para logo abaixo do título: o "por quê" na primeira dobra
     (Título também é order:-1 e vem antes no DOM -> foto → título → sinais → resto) */
  table.grid tbody td[data-label="Sinais"] { order: -1; justify-content: flex-start; flex-wrap: wrap; }
  table.grid tbody td[data-label="Sinais"]::before { display: none; }
  table.grid tbody td[data-label="Sinais"] .badges { justify-content: flex-start; }
  /* variações expandidas lêem como "filhas" do card de cima */
  table.grid tbody tr.subrow { background: #fbfdff !important; border-left: 3px solid #d7e6ff; margin: -4px 0 10px 14px; width: calc(100% - 14px); box-shadow: none; }
  table.grid tbody tr.subrow td.td-photo { display: none; }
  .btn-analyze-var { display: block; width: 100%; padding: 11px; min-height: 44px; font-size: 0.82rem; margin-top: 4px; }
  /* barra de análise: título completo orienta; o ID mono não diz nada no celular.
     Quebra em 2 linhas: linha 1 = Voltar + foto; linha 2 = título em largura cheia
     (senão o título espreme numa coluna de ~126px) */
  .analysis-bar { flex-wrap: wrap; }
  .analysis-bar .ab-meta { flex: 1 1 100%; }
  .analysis-bar .ab-title { white-space: normal; }
  .analysis-bar .ab-id { display: none; }
  /* .fit (width:1%) é conceito de coluna de DESKTOP — no card mobile o td volta a 100%
     (senão a caixa fica com ~3px e o conteúdo transborda "alinhado à esquerda") */
  table.grid tbody td.fit { width: 100%; }
  /* sticky do botão é conceito de scroll horizontal de DESKTOP — card não rola */
  .analyze-cell { position: static; background: transparent; }
  /* foto maior no card: reconhecimento do produto no celular */
  .thumb { width: 72px; height: 72px; }
  /* preço com desconto no card: riscado, pill e preço empilham à direita
     (no flex padrão ficariam lado a lado e estourariam a largura do card) */
  table.grid tbody td[data-label="Preço"] { display: block; text-align: right; }
  table.grid tbody td[data-label="Preço"]::before { float: left; }
  table.grid tbody td[data-label="Preço"] .badge-off { margin-left: auto; }
}
</style>

<script>
"use strict";

/* =========================================================================
   CONFIG — ajuste fácil no topo
   ========================================================================= */
const CONFIG = {
  // Outro agente está validando se o parâmetro q= (busca por nome) funciona
  // na items/search. Se confirmarem que não funciona, basta trocar para false:
  // o front some com a tentativa de q= e cai direto no aviso + sku=.
  // ⚠️ GATE DE RELEASE: o aval desta tela fica condicionado à validação do q= com
  // token real (já em andamento). Se q= não filtrar, USE_Q_PARAM=false ANTES de
  // qualquer port ao Bubble.
  USE_Q_PARAM: true,
  ANALYZE_URL: 'https://app.marketfacil.com.br/analise-anuncio',
  RECONNECT_URL: 'https://app.marketfacil.com.br/conexoes',  // placeholder — ajustar quando a URL real existir
  PAGE_SIZE: 50,
  HYDRATE_CHUNK: 20,
  OFFSET_CAP: 1000,            // ML trava offset em 1000
  COUNTS_CACHE_KEY: 'mf_sel_counts',
  COUNTS_TTL_MIN: 10,
  SET_TTL_MIN: 10,             // TTL dos Sets de sinais (camada B) e do mapa de perguntas (camada C)
  // Validado com token real: `secure_thumbnail` nunca volta (derivamos https do
  // próprio `thumbnail` trocando http->https) e `pictures` pesa ~1,5KB/item — fora.
  // +listing_type_id, shipping, date_created (camada A); +original_price (desconto);
  // +family_id, user_product_id (agrupamento por família UP). Todos validados no multiget.
  // ⚠️ item_relations (anúncios vinculados a catálogo) ainda NÃO validado no multiget com
  // token real — validar junto com q=/category=. Se não vier, o expansor simplesmente não aparece.
  MULTIGET_ATTRS: 'id,title,price,original_price,thumbnail,status,sub_status,health,tags,sold_quantity,available_quantity,permalink,warranty,catalog_listing,listing_type_id,shipping,date_created,family_id,user_product_id,item_relations',
  GROUP_FAMILIES: true,        // agrupar variações da mesma família (UP) em 1 linha-produto
  ANALYZE_BY_PRODUCT: true,    // clique num grupo analisa o produto (user_product_id) em vez da variação
  // Camada B — Sets de IDs por sinal (interseção). Só varre sinais com contador > 0.
  SIGNAL_SET_PAGE: 100,        // limit por página ao varrer os IDs de um sinal
  SIGNAL_SET_CAP: 300,         // teto de IDs por sinal (documentado); acima disso o badge cobre os 300 primeiros
  // Camada C — visitas 30d POR ITEM. ATENÇÃO: a ML NÃO tem endpoint bulk de visitas
  // por item (items/visits?ids= aceita só 1 id). Logo é 1 chamada por item da página
  // visível (custo ~PAGE_SIZE chamadas/página). Por isso fica atrás de uma flag:
  SHOW_VISITS: true,
  VISITS_WINDOW_DAYS: 30,
  VISITS_CONCURRENCY: 6,       // no máx. N chamadas de visita em voo ao mesmo tempo
  // Camada C — vendas 30d POR CONTA via orders/search (1-3 chamadas/conta, cache 10min).
  // Alimenta a taxa de conversão (vendas30÷visitas30, só com SHOW_VISITS) e a previsão
  // de estoque no ritmo recente. Se a conta tiver mais pedidos que o teto, as taxas NÃO
  // são exibidas (parcial enganaria) — a previsão cai no ritmo desde a criação.
  SALES_WINDOW_DAYS: 30,
  SALES30_MAX_PAGES: 3,        // teto de páginas de pedidos varridas (50/página)
};

/* Regras de sinais (badges) por anúncio — todas configuráveis aqui. */
const PROBLEM_RULES = {
  healthThreshold: 0.7,          // health numérico < 0.7 -> "Saúde ML"
  shortTitleMax: 50,             // título < 50 chars (só sinaliza se ainda não vende)
  // Regra do ML: frete grátis é OBRIGATÓRIO a partir deste valor; abaixo dele é
  // opcional e sai do bolso do vendedor (margem quase negativa — problema recorrente
  // relatado pelos usuários). Se o ML mudar o piso, atualizar aqui (o texto do badge acompanha).
  freeShippingFloor: 79,
  incompleteSpecsTag: 'incomplete_technical_specs',
  lowQualityPhotoTags: ['poor_quality_picture', 'poor_quality_thumbnail', 'with_low_quality_image'],
  catalogTag: 'catalog_boost',   // catalog_listing:true OU tag catalog_boost -> badge informativo "Catálogo"
  freeListingType: 'free',       // listing_type_id === 'free' -> baixa exposição (fato do ML, não regra nossa)
  // sub_status -> como exibir
  subStatusLabels: {
    forbidden:         { text: 'Infração',              cls: 'red' },
    waiting_for_patch: { text: 'Corrigir para reativar', cls: 'orange' },
    held:              { text: 'Suspenso',              cls: 'red' },
    suspended:         { text: 'Suspenso',              cls: 'red' },
    deleted:           { text: 'Excluído',              cls: 'gray' },
    out_of_stock:      { text: 'Sem estoque',           cls: 'gray' },
    freezed:           { text: 'Congelado',             cls: 'orange' },
    under_review:      { text: 'Em revisão',            cls: 'gray' },
    expired:           { text: 'Expirado',              cls: 'gray' },
    pending:           { text: 'Pendente',              cls: 'gray' },
    payment_required:  { text: 'Aguardando pagamento',  cls: 'orange' },
    picture_download_pending: { text: 'Processando fotos', cls: 'gray' },
  },
};

/* Chips de problema da conta. countKey aponta para a chave em `counts`. */
const PROBLEM_CHIPS = [
  { id: 'unhealthy',       sev: 'red',    label: 'Perdendo exposição',            filter: { reputation_health_gauge: 'unhealthy' }, countKey: 'gauge_unhealthy' },
  { id: 'warning',         sev: 'orange', label: 'Risco de perder exposição',     filter: { reputation_health_gauge: 'warning' },   countKey: 'gauge_warning' },

/* =========================================================================
   Utils
   ========================================================================= */
function escapeHtml(v) {
  if (v == null) return '';
  return String(v)
    .replace(/&/g, '&amp;').replace(/</g, '&lt;').replace(/>/g, '&gt;')
    .replace(/"/g, '&quot;').replace(/'/g, '&#39;');
}
function fmtPrice(n) {
  if (n == null || isNaN(n)) return '—';
  return 'R$ ' + Number(n).toLocaleString('pt-BR', { minimumFractionDigits: 2, maximumFractionDigits: 2 });
}
function $(sel) { return document.querySelector(sel); }
function el(html) { const d = document.createElement('div'); d.innerHTML = html; return d.firstElementChild; }

/* =========================================================================
   Camada de rede — TUDO via /api/ml/... (nunca direto na ML)
   ========================================================================= */
async function mlGet(mlPath) {
  if (MOCK) return mockGet(mlPath);
  const res = await fetch('/api/ml/' + mlPath);
  let data = null;
  try { data = await res.json(); } catch (e) { /* corpo não-JSON */ }
  if (res.status === 401) {
    const err = new Error('sessao_expirada'); err.status = 401; throw err;
  }
  if (!res.ok) {
    const err = new Error('erro_ml'); err.status = res.status; err.body = data; throw err;
  }
  return data;
}

/* =========================================================================
   Contagens dos chips (com cache em sessionStorage, 10 min)
   ========================================================================= */
// Chave separada por modo: mock e real não podem compartilhar cache de contagens.
const COUNTS_KEY = CONFIG.COUNTS_CACHE_KEY + (MOCK ? ':mock' : '');
function getCachedCounts() {
  try {
    const raw = sessionStorage.getItem(COUNTS_KEY);
    if (!raw) return null;
    const obj = JSON.parse(raw);
    if (!obj || !obj.ts) return null;
    if (Date.now() - obj.ts > CONFIG.COUNTS_TTL_MIN * 60 * 1000) return null;
    return obj.counts;
  } catch (e) { return null; }
}
function setCachedCounts(counts) {
  try { sessionStorage.setItem(COUNTS_KEY, JSON.stringify({ ts: Date.now(), counts })); } catch (e) {}
}

async function fetchCounts(sellerId) {
  const cached = getCachedCounts();
  if (cached) return cached;

  const counts = {};
  let ok = false;   // pelo menos 1 chamada respondeu — {} por falha total NUNCA vira "Tudo certo!"

  // 1 chamada com include_filters -> counts de labels / status / sub_status
  try {
    const inc = await mlGet(`users/${sellerId}/items/search?include_filters=true&limit=1`);
    ok = true;
    const filterGroups = [].concat(inc.available_filters || [], inc.filters || []);
    filterGroups.forEach((g) => {
      (g.values || []).forEach((v) => {
        if (g.id === 'labels') counts['label_' + v.id] = v.results;
        else if (g.id === 'status') counts['status_' + v.id] = v.results;
        else if (g.id === 'sub_status') counts['substatus_' + v.id] = v.results;
      });
    });
  } catch (e) { /* segue sem esses counts */ }

  // 2 chamadas gauge (limit=1, lê paging.total)
  try {
    const g1 = await mlGet(`users/${sellerId}/items/search?reputation_health_gauge=unhealthy&limit=1`);
    ok = true;
    counts.gauge_unhealthy = (g1.paging && g1.paging.total) || 0;
  } catch (e) {}
  try {
    const g2 = await mlGet(`users/${sellerId}/items/search?reputation_health_gauge=warning&limit=1`);
    ok = true;
    counts.gauge_warning = (g2.paging && g2.paging.total) || 0;
  } catch (e) {}

  // 1 chamada missing_product_identifiers
  try {
    const m = await mlGet(`users/${sellerId}/items/search?missing_product_identifiers=true&limit=1`);
    ok = true;
    counts.missing_product_identifiers = (m.paging && m.paging.total) || 0;
  } catch (e) {}

  // Falha TOTAL (nenhuma chamada respondeu): não cachear nem renderizar {} como "Tudo certo".
  // Conta legitimamente vazia (chamadas ok, zero problemas) continua mostrando a mensagem verde.
  if (!ok) throw new Error('resumo_indisponivel');

  setCachedCounts(counts);
  return counts;
}

function renderChips(counts) {
  const area = $('#chipsArea');
  const visible = PROBLEM_CHIPS
    .map((c) => ({ chip: c, count: Number(counts[c.countKey] || 0) }))
    .filter((x) => x.count > 0);

  if (visible.length === 0) {
    area.innerHTML = '<div class="chips-clean"><span class="chip-ind" style="background:var(--green);box-shadow:0 0 0 3px var(--green-light)"></span> Tudo certo! Nenhum problema encontrado nos seus anúncios.</div>';
    return;
  }

  const html = '<div class="chips">' + visible.map(({ chip, count }) => {
    const on = state.activeChip === chip.id ? ' active' : '';
    return `<button class="chip${on}" data-chip="${chip.id}">
      <span class="chip-ind sev-${chip.sev}"></span>
      <span>${escapeHtml(chip.label)}</span>
      <span class="chip-count">${count}</span>
    </button>`;
  }).join('') + '</div><p class="chips-tip">Escolha um problema para ver só esses anúncios</p>';
  area.innerHTML = html;

  wireChipButtons(area, counts);
}

// Repinta os chips a partir do cache; sem cache (expirou ou o resumo falhou antes),
// mostra o skeleton e rebusca — {} nunca vira um falso "Tudo certo!".
function renderChipsFresh() {
  const cached = getCachedCounts();
  if (cached) { renderChips(cached); return; }
  $('#chipsArea').innerHTML = '<div class="chips-skel"><span></span><span></span><span></span><span></span></div>';
  fetchCounts(state.sellerId)
    .then((c) => { renderChips(c); })
    .catch(() => { $('#chipsArea').innerHTML = '<p class="chips-tip">Não deu para carregar o resumo agora — toque ou clique em “Atualizar” para tentar de novo.</p>'; });
}

function wireChipButtons(area, counts) {

  area.querySelectorAll('.chip').forEach((btn) => {
    btn.addEventListener('click', () => {
      const id = btn.getAttribute('data-chip');
      state.activeChip = (state.activeChip === id) ? null : id;
      state.offset = 0;
      // chip que fixa status (paused_no_stock) sincroniza o toggle visual;
      // chip sem status próprio zera o filtro de status ("Todos") pra lista bater com a contagem do chip
      const chip = PROBLEM_CHIPS.find((c) => c.id === state.activeChip);
      if (chip) {
        // guarda o status que o usuário tinha antes do chip (pra devolver quando ele sair)
        if (state.prevStatus == null) state.prevStatus = state.status;
        if (chip.filter.status) setStatusToggle(chip.filter.status);
        else setStatusToggle('all');
      } else {
        // desativou o chip: devolve o status de antes em vez de largar em "Todos"
        setStatusToggle(state.prevStatus || 'active');
        state.prevStatus = null;
      }
      renderChips(getCachedCounts() || counts);
      syncClearBtn();
      loadPage().then(() => {
        // no celular os chips ficam acima da dobra — leva o usuário até a lista filtrada
        if (window.matchMedia('(max-width:720px)').matches) $('#tableHost').scrollIntoView({ block: 'start', behavior: 'smooth' });
      });
    });
  });
}

/* =========================================================================
   Cache genérico em sessionStorage (chaves separadas mock/real, TTL SET_TTL_MIN)
   ========================================================================= */
function scopedKey(base) { return base + (MOCK ? ':mock' : ''); }
function getCachedJson(base) {
  try {
    const raw = sessionStorage.getItem(scopedKey(base));
    if (!raw) return null;
    const obj = JSON.parse(raw);
    if (!obj || !obj.ts || Date.now() - obj.ts > CONFIG.SET_TTL_MIN * 60 * 1000) return null;
    return obj.data;
  } catch (e) { return null; }
}
function setCachedJson(base, data) {
  try { sessionStorage.setItem(scopedKey(base), JSON.stringify({ ts: Date.now(), data })); } catch (e) {}
}

/* Re-render incremental: as camadas B/C chegam depois e enriquecem a página já pintada.
   Guardado por state.loading: callbacks tardios (visitas/sinais da página ANTERIOR) não
   podem repintar itens velhos por cima do spinner durante uma troca de página. */
function renderCurrentRows() {
  if (state.loading) return;
  if (state.lastItems && state.lastItems.length) renderRows(state.lastItems);
}

/* =========================================================================
   Camada B — Sets de IDs por sinal (só busca sinais com contador > 0)
   ========================================================================= */
async function fetchSignalIds(sellerId, filter) {
  const ids = [];
  let incomplete = false;   // true = a varredura NÃO cobriu todos os anúncios do sinal (não afirmar "OK")
  for (let offset = 0; offset < CONFIG.SIGNAL_SET_CAP; offset += CONFIG.SIGNAL_SET_PAGE) {
    const p = new URLSearchParams(filter);
    p.set('limit', String(CONFIG.SIGNAL_SET_PAGE));
    p.set('offset', String(offset));
    let resp;
    try { resp = await mlGet(`users/${sellerId}/items/search?${p.toString()}`); }
    catch (e) { if (offset > 0) incomplete = true; break; }
    const results = Array.isArray(resp.results) ? resp.results : [];
    results.forEach((it) => { const v = typeof it === 'string' ? it : (it && (it.id || it.item_id)); if (v) ids.push(v); });
    const total = (resp.paging && resp.paging.total) || 0;
    if (offset + CONFIG.SIGNAL_SET_PAGE >= total) break;
    if (offset + CONFIG.SIGNAL_SET_PAGE >= CONFIG.SIGNAL_SET_CAP && total > CONFIG.SIGNAL_SET_CAP) {
      console.warn(`[ad-selector] sinal cobre só os primeiros ${CONFIG.SIGNAL_SET_CAP} de ${total} anúncios`);
      incomplete = true;
      break;
    }
  }
  return { ids, incomplete };
}

async function loadSignalSets(sellerId, counts) {
  for (const sig of SIGNAL_SETS) {
    const cnt = Number((counts && counts[sig.countKey]) || 0);
    if (cnt <= 0) { state.signalSets[sig.id] = new Set(); state.signalSetsIncomplete[sig.id] = false; continue; }  // chip diz 0 -> não chama
    const cached = getCachedJson('mf_sel_sig2_' + sig.id);
    if (cached && Array.isArray(cached.ids)) {
      state.signalSets[sig.id] = new Set(cached.ids);
      state.signalSetsIncomplete[sig.id] = !!cached.incomplete;
      renderCurrentRows(); continue;
    }
    const found = await fetchSignalIds(sellerId, sig.filter);
    setCachedJson('mf_sel_sig2_' + sig.id, found);
    state.signalSets[sig.id] = new Set(found.ids);
    state.signalSetsIncomplete[sig.id] = !!found.incomplete;
    renderCurrentRows(); // enriquece a página assim que cada sinal fica pronto
  }
}

/* =========================================================================
   Camada C — perguntas sem resposta (1 chamada por conta, cache 10 min)
   ========================================================================= */
async function loadQuestions(sellerId) {
  const cached = getCachedJson('mf_sel_questions');
  if (cached) { state.questionsMap = cached; renderCurrentRows(); return; }
  try {
    const resp = await mlGet(`questions/search?seller_id=${sellerId}&status=UNANSWERED&limit=50`);
    const map = {};
    (resp.questions || []).forEach((qq) => { if (qq && qq.item_id) map[qq.item_id] = (map[qq.item_id] || 0) + 1; });
    state.questionsMap = map;
    setCachedJson('mf_sel_questions', map);
    renderCurrentRows();
  } catch (e) { /* 403/erro (ex.: whitelist antiga do serve.js) -> segue sem badges de pergunta */ }
}

/* =========================================================================
   Camada C — vendas 30d por item via orders/search (POR CONTA, não por item:
   1-3 chamadas no total, cache 10 min). Soma as unidades por item dos pedidos
   pagos dos últimos 30 dias. Honestidade: se a conta tem mais pedidos que o
   teto varrido, marca incomplete e as taxas NÃO aparecem (parcial enganaria).
   ========================================================================= */
async function loadSales30(sellerId) {
  const cached = getCachedJson('mf_sel_sales30');
  if (cached) { state.sales30Map = cached.map; state.sales30Incomplete = !!cached.incomplete; renderCurrentRows(); return; }
  try {
    const from = new Date(Date.now() - CONFIG.SALES_WINDOW_DAYS * 864e5).toISOString();
    const map = {};
    let offset = 0, total = 0, pages = 0;
    do {
      const resp = await mlGet(`orders/search?seller=${sellerId}&order.status=paid&order.date_created.from=${encodeURIComponent(from)}&limit=50&offset=${offset}`);
      total = (resp.paging && resp.paging.total) || 0;
      (resp.results || []).forEach((o) => (o.order_items || []).forEach((oi) => {
        const iid = oi && oi.item && oi.item.id;
        if (iid) map[iid] = (map[iid] || 0) + (Number(oi.quantity) || 0);
      }));
      offset += 50; pages++;
    } while (offset < total && pages < CONFIG.SALES30_MAX_PAGES);
    const incomplete = total > offset && offset >= CONFIG.SALES30_MAX_PAGES * 50;
    state.sales30Map = map;
    state.sales30Incomplete = incomplete;
    setCachedJson('mf_sel_sales30', { map, incomplete });
    renderCurrentRows();
  } catch (e) { /* sem escopo de pedidos / erro -> segue sem conversão; previsão cai no ritmo desde a criação */ }
}
// Unidades vendidas nos últimos 30d de um item (null = camada indisponível/incompleta)
function sales30Of(id) {
  if (!state.sales30Map || state.sales30Incomplete) return null;
  return state.sales30Map[id] || 0;
}

/* =========================================================================
   Camada C — visitas 30d por item. 1 chamada por item (ML não tem bulk),
   com limite de concorrência. Custo ~PAGE_SIZE chamadas por página.
   ========================================================================= */
// time_window devolve o TOTAL e a série diária na MESMA chamada (custo igual ao
// endpoint de total puro) — a série alimenta o minigráfico de tendência.
// ⚠️ time_window ainda não validado com token real (o date_from/date_to foi).
async function loadVisitsForPage(ids) {
  if (!CONFIG.SHOW_VISITS) return;
  const pending = ids.filter((id) => !(id in state.visitsMap));
  if (!pending.length) return;
  let idx = 0;
  async function worker() {
    while (idx < pending.length) {
      const id = pending[idx++];
      try {
        const resp = await mlGet(`items/${id}/visits/time_window?last=${CONFIG.VISITS_WINDOW_DAYS}&unit=day`);
        state.visitsMap[id] = (resp && typeof resp.total_visits === 'number') ? resp.total_visits : null;
        if (resp && Array.isArray(resp.results)) state.visitsSeries[id] = resp.results.map((r) => Number(r && r.total) || 0);
      } catch (e) { state.visitsMap[id] = null; }
    }
  }
  const workers = [];
  for (let i = 0; i < Math.min(CONFIG.VISITS_CONCURRENCY, pending.length); i++) workers.push(worker());
  await Promise.all(workers);
  renderCurrentRows();
}

/* =========================================================================
   Construção da URL de busca da página
   ========================================================================= */
function buildListUrl(offsetOverride) {
  const p = new URLSearchParams();

  // status (o filtro do chip pode sobrescrever depois)
  if (state.status === 'active') p.set('status', 'active');
  else if (state.status === 'paused') p.set('status', 'paused');
  // 'all' -> não manda status

  p.set('orders', state.order);
  p.set('limit', String(CONFIG.PAGE_SIZE));
  p.set('offset', String(offsetOverride != null ? offsetOverride : state.offset));

  // filtro do chip ativo (pode sobrescrever status)
  if (state.activeChip) {
    const chip = PROBLEM_CHIPS.find((c) => c.id === state.activeChip);
    if (chip) Object.entries(chip.filter).forEach(([k, v]) => p.set(k, v));
  }

  // filtros server-side validados com token real
  if (state.listingType) p.set('listing_type_id', state.listingType);
  if (state.logisticType) p.set('logistic_type', state.logisticType);

  // busca textual (q ou sku) — o caso MLB é tratado antes, sem chamar search
  if (state.search && state.searchParam) {
    p.set(state.searchParam, state.search);
  }

  return `users/${state.sellerId}/items/search?${p.toString()}`;
}

/* =========================================================================
   Hidratação em chunks de 20 via multiget
   ========================================================================= */
async function hydrate(ids) {
  const out = [];
  for (let i = 0; i < ids.length; i += CONFIG.HYDRATE_CHUNK) {
    const chunk = ids.slice(i, i + CONFIG.HYDRATE_CHUNK);
    const resp = await mlGet(`items?ids=${chunk.join(',')}&attributes=${encodeURIComponent(CONFIG.MULTIGET_ATTRS)}`);
    (resp || []).forEach((entry) => {
      if (entry && entry.body && (entry.code === 200 || entry.body.id)) out.push(entry.body);
    });
  }
  return out;
}

/* =========================================================================
   Badges por anúncio (client-side, a partir do multiget)
   ========================================================================= */
function computeBadges(item) {
  const problems = [];  // problemas suprimem o badge "OK"
  const tags = Array.isArray(item.tags) ? item.tags : [];
  const id = item.id || '';
  const inSet = (sigId) => !!(state.signalSets[sigId] && state.signalSets[sigId].has(id));

  // sub_status (array na ML)
  const subs = Array.isArray(item.sub_status) ? item.sub_status : (item.sub_status ? [item.sub_status] : []);
  subs.forEach((s) => {
    const map = PROBLEM_RULES.subStatusLabels[s];
    if (map) problems.push({ text: map.text, cls: map.cls });
    else problems.push({ text: 'Precisa de atenção', cls: 'gray' });  // sub_status desconhecido nunca sai em inglês
  });

  // Saúde SÓ quando numérica. Validado: health vem null na maioria (null = sem dado, sem badge).
  if (typeof item.health === 'number' && item.health < PROBLEM_RULES.healthThreshold) {
    problems.push({ text: 'Saúde do anúncio ' + Math.round(item.health * 100) + '%', cls: 'red' });
  }
  // Camada B — reputação (interseção de IDs): perder > risco
  if (inSet('unhealthy')) problems.push({ text: 'Perdendo exposição', cls: 'red' });
  else if (inSet('warning')) problems.push({ text: 'Risco de perder exposição', cls: 'orange' });

  // Ficha técnica incompleta (tag do multiget)
  if (tags.includes(PROBLEM_RULES.incompleteSpecsTag)) problems.push({ text: 'Ficha técnica incompleta', cls: 'orange' });

  // Foto de baixa qualidade — Camada B (autoritativo) OU tag (redundância) -> 1 badge só
  if (inSet('low_quality_img') || PROBLEM_RULES.lowQualityPhotoTags.some((t) => tags.includes(t))) {
    problems.push({ text: 'Foto de baixa qualidade', cls: 'orange' });
  }
  // Camada A — Anúncio Grátis (baixa exposição; fato do ML)
  if (item.listing_type_id === PROBLEM_RULES.freeListingType) {
    problems.push({ text: 'Anúncio Grátis — baixa exposição', cls: 'orange' });
  }
  // Camada A — frete grátis pago do próprio bolso (preço abaixo do piso do ML)
  if (isCheapFreeShipping(item)) problems.push({ text: CHEAP_FREESHIP_BADGE, cls: 'orange' });
  // Camada B — estoque quase no fim
  if (inSet('few_available')) problems.push({ text: 'Estoque quase no fim', cls: 'yellow' });

  // Título curto — SÓ se ainda não vendeu (nunca sinalizar título que já vende: reseta indexação)
  if ((item.title || '').length < PROBLEM_RULES.shortTitleMax && item.sold_quantity === 0) {
    problems.push({ text: 'Título curto', cls: 'yellow' });
  }
  // Camada B — sem código GTIN
  if (inSet('missing_gtin')) problems.push({ text: 'Sem código de barras (GTIN)', cls: 'gray' });

  // Camada C — sem visitas em 30 dias (só quando já carregou e deu exatamente 0)
  if (CONFIG.SHOW_VISITS && state.visitsMap[id] === 0) {
    problems.push({ text: 'Sem visitas em 30 dias', cls: 'gray' });
  }
  // Camada C — perguntas sem resposta
  const nq = state.questionsMap[id] || 0;
  if (nq > 0) problems.push({ text: nq === 1 ? '1 pergunta sem resposta' : nq + ' perguntas sem resposta', cls: 'orange' });

  // Garantia não informada (menor prioridade, mas conta como problema; aponta o campo a preencher)
  if (!item.warranty) problems.push({ text: 'Garantia não informada', cls: 'gray' });

  // Monta: problemas (ou OK) + informativos neutros (não suprimem OK).
  // Catálogo saiu dos badges: virou marcador dedicado junto do título (tag-catalog).
  const out = [];
  problems.forEach((b) => out.push(b));
  // Varredura incompleta de algum sinal (conta grande) e o item não está no Set:
  // não dá pra afirmar que está tudo bem — melhor sem veredito do que um "OK" falso.
  const uncertain = SIGNAL_SETS.some((s) => state.signalSetsIncomplete[s.id] && !(state.signalSets[s.id] && state.signalSets[s.id].has(id)));
  if (problems.length === 0 && !uncertain) out.push({ text: 'Sem problemas', cls: 'green' });
  // Camada A — informativos neutros
  if (item.shipping && item.shipping.free_shipping === false) out.push({ text: 'Sem frete grátis', cls: 'gray' });
  // "Ainda sem vendas" (não "Sem vendas"): não contradiz o "Sem problemas" na mesma linha
  if (item.sold_quantity === 0) out.push({ text: 'Ainda sem vendas', cls: 'gray' });
  return out;
}

// Minigráfico de tendência (visitas por dia, 30d) — SVG inline, dados numéricos próprios.

function sparkTrend(series) {
  const n = series.length;

  const last = series.slice(n - 7).reduce((a, b) => a + b, 0);
  const prev = series.slice(n - 14, n - 7).reduce((a, b) => a + b, 0);
  if (prev === 0) return last > 0 ? 'up' : 'flat';

  const pts = series.map((v, i) => { const p = pt(v, i); return p.x.toFixed(1) + ',' + p.y.toFixed(1); }).join(' ');
  const trend = sparkTrend(series);
  const dotColor = trend === 'up' ? 'var(--green-dark)' : (trend === 'down' ? 'var(--red)' : '#94a3b8');
  const end = pt(series[n - 1], n - 1);
  return `<svg class="spark" width="${w}" height="${h}" viewBox="0 0 ${w} ${h}" aria-hidden="true">
    <line x1="0" y1="${h - 2}" x2="${w}" y2="${h - 2}" stroke="var(--border)" stroke-width="1"/>
    <polyline points="${pts}" fill="none" stroke="#94a3b8" stroke-width="1.4" stroke-linejoin="round" stroke-linecap="round"/>

// produto inteiro (agregado de família parcial induz decisão de reposição errada).
// Cada variação vira linha simples com os números reais dela; o clique continua

function buildDisplayRows(items) {
  const hasCut = !!(state.activeChip || state.search || state.discountOnly || state.freeShipUnder);
  if (!CONFIG.GROUP_FAMILIES || hasCut) return items.map((it) => ({ type: 'single', item: it }));
  const rows = [];

    if (!fam) { rows.push({ type: 'single', item: it }); return; }

// Título da linha-família: maior prefixo comum entre os títulos das variações.
// Título de UMA variação ("— Tam M") ao lado de estoque/vendas SOMADOS induz erro de
// leitura e sugere que só aquela variação será analisada. Cálculo 100% client-side
// sobre dados já carregados — zero custo de API.
function familyTitle(items, fallbackTitle) {
  const titles = items.map((i) => String(i.title || ''));
  let p = titles[0] || '';
  for (let k = 1; k < titles.length && p; k++) {
    const t = titles[k];
    let j = 0;
    const max = Math.min(p.length, t.length);
    while (j < max && p[j] === t[j]) j++;
    p = p.slice(0, j);
  }
  // corte no meio de palavra -> recua até o último espaço
  const midWord = p.length > 0 && p[p.length - 1] !== ' '
    && titles.some((t) => t.length > p.length && t[p.length] !== ' ');
  if (midWord) {
    const sp = p.lastIndexOf(' ');
    p = sp >= 0 ? p.slice(0, sp) : '';
  }
  // apara espaços e separadores do fim
  p = p.replace(/[\s—–\-·,|(]+$/, '');
  // palavra final de <=3 caracteres precedida de separador (ex.: "Tam", "Cor") sai também
  const m = p.match(/[\s—–\-·,|(]+[^\s—–\-·,|(]{1,3}$/);
  if (m) p = p.slice(0, p.length - m[0].length);
  // resultado curto demais -> mantém o comportamento atual (título do representante)
  if (p.length < 10) return fallbackTitle || '';
  return p;
}
function familyAgg(items) {
  const rep = items.reduce((a, b) => ((b.sold_quantity || 0) > (a.sold_quantity || 0) ? b : a), items[0]);
  const prices = items.map((i) => Number(i.price)).filter((n) => !isNaN(n));
  let visitsPending = false, visitsSum = 0;
  items.forEach((i) => { const v = state.visitsMap[i.id]; if (v === undefined) visitsPending = true; else if (typeof v === 'number') visitsSum += v; });
  const upItem = items.find((i) => i.user_product_id);
  // faixa dos preços originais (só variações com desconto) — pro "de R$X por R$Y" da linha-família
  const origs = items.filter((i) => discountPct(i) > 0).map((i) => Number(i.original_price)).filter((n) => !isNaN(n));
  return {
    rep,
    min: Math.min.apply(null, prices), max: Math.max.apply(null, prices),
    stock: items.reduce((s, i) => s + (Number(i.available_quantity) || 0), 0),
    sales: items.reduce((s, i) => s + (Number(i.sold_quantity) || 0), 0),
    visitsPending, visitsSum,
    maxOff: Math.max.apply(null, [0].concat(items.map(discountPct))),
    origMin: origs.length ? Math.min.apply(null, origs) : null,
    origMax: origs.length ? Math.max.apply(null, origs) : null,

    count: items.length,

}
// Faixa persistente do quick-filter "Frete grátis abaixo de R$ 79" (mesmo padrão do desconto)

function renderRows(items) {
  const host = $('#tableHost');

  if (state.discountOnly) pageItems = pageItems.filter((it) => discountPct(it) > 0);
  if (state.freeShipUnder) pageItems = pageItems.filter(isCheapFreeShipping);

  const displayRows = buildDisplayRows(pageItems);
  state.displayCount = displayRows.length;

  if (!pageItems.length) {
    host.innerHTML = `${chipFilterBannerHtml()}${discountBannerHtml()}${freeShipBannerHtml()}<div class="state">
      <span class="emoji"><svg width="40" height="40" viewBox="0 0 24 24" fill="none" stroke="#94a3b8" stroke-width="1.6" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true"><path d="M22 12h-6l-2 3h-4l-2-3H2"/><path d="M5 5h14a2 2 0 0 1 2 2v10a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2V7a2 2 0 0 1 2-2Z"/></svg></span>
      <h3>Nenhum anúncio encontrado</h3>
      <p>${(state.search && state.searchParam === 'sku') ? 'Não achamos por esse texto. Cole o ID ou o link do anúncio — é só copiar o endereço da página do anúncio no Mercado Livre.' : (state.freeShipUnder ? `Nenhum anúncio desta página está abaixo de R$ ${PROBLEM_RULES.freeShippingFloor} com frete grátis.` : (state.discountOnly ? 'Nenhum anúncio desta página está com desconto.' : 'Nenhum anúncio bate com esses filtros. Tente ajustar a busca ou limpar os filtros.'))}</p>

      const open = !!state.expandedFamilies[row.familyId];

        }

      const catItem = row.items.find(isCatalogItem);
      trs.push(`<tr data-key="${escapeHtml(key)}" data-family="${escapeHtml(row.familyId)}" data-analyze="${escapeHtml(analyzeId)}" data-title="${escapeHtml(famTitle || '')}" data-thumb="${escapeHtml(httpsThumb(a.rep.thumbnail))}" class="row${sel}">
        <td class="td-photo" data-label="Foto">${a.rep.thumbnail ? `<img class="thumb" loading="lazy" src="${escapeHtml(httpsThumb(a.rep.thumbnail))}" alt="">` : '<span class="thumb"></span>'}</td>

          <div class="row-id">${catItem ? catalogTagHtml(catItem) : ''}<span class="mono cell-id">${escapeHtml(a.rep.id)}</span>${idActionsHtml(a.rep.id, a.rep.permalink)}</div>
        </div></div></td>
        <td class="num fit" data-label="Preço">${priceCell}</td>
        <td class="num fit" data-label="Estoque">${stockCellHtml(a.stock, false, famEst)}</td>
        <td class="num fit" data-label="Vendas (total)"><span class="mono cell-stock">${a.sales}</span></td>
        <td class="num fit" data-label="Visitas (30 dias)">${famVisits}</td>
        <td data-label="Sinais"><div class="badges">${badges}</div></td>
        <td class="analyze-cell"><button class="btn-analyze" title="Analisa o produto inteiro (todas as variações de uma vez)">Analisar →</button></td>

      if (open) {

  host.innerHTML = `${chipFilterBannerHtml()}${discountBannerHtml()}${freeShipBannerHtml()}<div class="tbl-wrap">

        <th class="num fit">Preço</th><th class="num fit">Estoque</th><th class="num fit th-wrap" title="Total de vendas do anúncio desde a criação">Vendas (total)</th><th class="num fit th-wrap">Visitas (30 dias)</th>
        <th class="th-sinais">Sinais</th><th></th>

function wireRows(host) {
  // caret (expandir/colapsar família) — antes do clique da linha
  host.querySelectorAll('.caret').forEach((c) => {
    c.addEventListener('click', (e) => {
      e.stopPropagation();
      const fam = c.getAttribute('data-family');
      state.expandedFamilies[fam] = !state.expandedFamilies[fam];
      renderCurrentRows();
    });
  });
  // badge "N variações" também expande/colapsa a família (mesmo comportamento do caret)
  host.querySelectorAll('.badge.variations[data-family]').forEach((b) => {
    b.addEventListener('click', (e) => {
      e.stopPropagation();
      const fam = b.getAttribute('data-family');
      state.expandedFamilies[fam] = !state.expandedFamilies[fam];
      renderCurrentRows();
    });
  });
  // pill "N anúncios vinculados" (catálogo) expande/colapsa as sub-linhas vinculadas
  host.querySelectorAll('.rel-pill[data-rel]').forEach((b) => {
    b.addEventListener('click', (e) => {
      e.stopPropagation();
      const rid = b.getAttribute('data-rel');
      state.expandedRelations[rid] = !state.expandedRelations[rid];
      renderCurrentRows();
    });
  });
  // badge "+N" / "− menos" expande/colapsa os sinais da linha (desktop)
  host.querySelectorAll('.badge-more').forEach((b) => {
    b.addEventListener('click', (e) => {
      e.stopPropagation();
      const key = b.getAttribute('data-more');
      state.expandedBadges[key] = !state.expandedBadges[key];
      renderCurrentRows();
    });
  });
  // dica "o que fazer" no toque (mobile — title= é invisível no celular):
  // 1º toque abre a dica logo abaixo dos sinais; mesmo badge fecha; outro badge troca
  if (window.matchMedia('(max-width:720px)').matches) {
    host.querySelectorAll('.badge[data-hint]').forEach((b) => {
      b.addEventListener('click', (e) => {
        e.stopPropagation();   // não dispara a análise da linha (mesmo padrão dos outros controles do card)
        const box = b.closest('.badges');
        if (!box) return;
        const hint = b.getAttribute('data-hint');
        const prev = box.nextElementSibling;
        const hadHint = !!(prev && prev.classList && prev.classList.contains('badge-hint'));
        const sameHint = hadHint && prev.textContent === hint;
        if (hadHint) prev.remove();
        if (!sameHint) {
          const d = document.createElement('div');
          d.className = 'badge-hint';
          d.textContent = hint;   // textContent: nunca injeta HTML
          box.insertAdjacentElement('afterend', d);
        }
      });
    });
  }
  // copiar ID
  host.querySelectorAll('.id-copy').forEach((el2) => {
    el2.addEventListener('click', (e) => {
      e.stopPropagation();
      const id = el2.getAttribute('data-copy');
      copyToClipboard(id, el2);
    });
  });
  // abrir no ML não deve disparar a análise
  host.querySelectorAll('.id-open').forEach((a) => a.addEventListener('click', (e) => e.stopPropagation()));
  // clique na linha (produto ou anúncio) -> fluxo integrado
  // (seleção de texto no título não conta como clique: soltar o mouse após arrastar não analisa)
  // Mobile (P7 do design review): só o BOTÃO, a foto ou o título disparam a análise —
  // tocar nos números/sinais enquanto lê ou rola não navega por acidente.
  const mobTap = window.matchMedia('(max-width:720px)').matches;
  const tapAllowed = (e) => !mobTap || !!(e.target.closest && e.target.closest('.btn-analyze, .btn-analyze-var, .td-photo, .cell-title'));
  host.querySelectorAll('tr.row').forEach((tr) => {
    tr.addEventListener('click', (e) => {
      if (String(window.getSelection ? window.getSelection() : '').length) return;
      if (!tapAllowed(e)) return;
      enterAnalysis(tr.getAttribute('data-analyze'), tr.getAttribute('data-title'), tr.getAttribute('data-thumb'), tr.getAttribute('data-key'));
    });
  });
  // sub-linha (variação) -> analisa a variação específica
  host.querySelectorAll('tr.subrow').forEach((tr) => {
    tr.addEventListener('click', (e) => {
      if (String(window.getSelection ? window.getSelection() : '').length) return;
      if (!tapAllowed(e)) return;
      enterAnalysis(tr.getAttribute('data-analyze'), tr.getAttribute('data-title'), tr.getAttribute('data-thumb'), tr.getAttribute('data-analyze'));
    });
  });
}

function copyToClipboard(text, el2) {
  const done = () => {
    const tag = document.createElement('span');
    tag.className = 'id-copied'; tag.textContent = 'Copiado!';
    el2.parentNode.appendChild(tag);
    setTimeout(() => tag.remove(), 1200);
  };
  if (navigator.clipboard && navigator.clipboard.writeText) navigator.clipboard.writeText(text).then(done).catch(done);
  else { try { const ta = document.createElement('textarea'); ta.value = text; document.body.appendChild(ta); ta.select(); document.execCommand('copy'); ta.remove(); } catch (e) {} done(); }
}

function pagerHtml() {
  const total = state.total;
  const shownFrom = total === 0 ? 0 : state.offset + 1;
  const shownTo = Math.min(state.offset + CONFIG.PAGE_SIZE, total);
  const cappedTotal = Math.min(total, CONFIG.OFFSET_CAP);
  const pct = cappedTotal ? Math.min(100, Math.round((shownTo / cappedTotal) * 100)) : 0;
  const prevDisabled = state.offset <= 0 ? 'disabled' : '';
  const atCap = state.offset + CONFIG.PAGE_SIZE >= CONFIG.OFFSET_CAP;
  const nextDisabled = (shownTo >= total || atCap) ? 'disabled' : '';
  // agrupamento por família: se a página exibe menos linhas que anúncios, mostra "· N produtos"
  const grouped = (CONFIG.GROUP_FAMILIES && state.displayCount != null && state.displayCount < (shownTo - state.offset))
    ? ` · agrupados em <b>${state.displayCount}</b> produtos` : '';
  // Recorte client-side ativo: o pager conta o que a tabela realmente mostra
  const cuts = [];
  if (state.discountOnly) cuts.push('com desconto');
  if (state.freeShipUnder) cuts.push(`com frete grátis abaixo de R$ ${PROBLEM_RULES.freeShippingFloor}`);
  const info = cuts.length
    ? `Mostrando <b>${state.displayCount}</b> anúncios ${cuts.join(' e ')} (dos <b>${shownFrom}–${shownTo}</b> de <b>${total}</b>)`
    : `Mostrando <b>${shownFrom}–${shownTo}</b> de <b>${total}</b> anúncios${grouped}`;
  return `<div class="pager">
    <div class="pager-info">${info}</div>
    <div class="pager-progress"><span style="width:${pct}%"></span></div>
    <div class="pager-btns">
      <button id="prevBtn" ${prevDisabled}>← Anterior</button>
      <button id="nextBtn" ${nextDisabled}>Próxima →</button>
    </div>
  </div>`;
}

function wirePager() {
  const prev = $('#prevBtn'), next = $('#nextBtn');
  // depois de trocar de página, leva o usuário ao topo da nova lista (após o render,
  // senão o scroll acontece com a página ainda colapsada no spinner e não chega lá)
  const scrollToTable = () => { $('#tableHost').scrollIntoView({ block: 'start' }); };
  if (prev) prev.addEventListener('click', () => { if (state.offset > 0) { state.offset = Math.max(0, state.offset - CONFIG.PAGE_SIZE); loadPage().then(scrollToTable); } });
  if (next) next.addEventListener('click', () => {
    const nextOffset = state.offset + CONFIG.PAGE_SIZE;
    if (nextOffset >= CONFIG.OFFSET_CAP) {
      setBanner('warn', 'O Mercado Livre limita a navegação a 1.000 anúncios. Use a busca ou os filtros acima para refinar e chegar no anúncio que você quer.');
      return;
    }
    state.offset = nextOffset;
    loadPage().then(scrollToTable);
  });
}

/* =========================================================================
   Fluxo principal de carga de página
   ========================================================================= */
async function loadPage() {
  const host = $('#tableHost');
  state.loading = true;
  writeStateToUrl();           // mantém a URL em sincronia (F5 preserva, link compartilhável)
  host.innerHTML = loadingHtml('Carregando seus anúncios…');
  clearBanner();

  try {
    // Caso especial: busca por ID MLB/MLBU -> hidrata direto, resultado único
    if (state.search && MLB_RE.test(state.search)) {
      const items = await hydrate([state.search.toUpperCase()]);
      state.total = items.length;
      state.lastItems = items;
      state.loading = false;
      renderRows(items);
      loadVisitsForPage(items.map((i) => i.id));
      return;
    }

    const searchResp = await mlGet(buildListUrl());
    const results = Array.isArray(searchResp.results) ? searchResp.results : [];
    // results é array de STRINGS (ids) — mapeamento defensivo
    const ids = results
      .map((it) => (typeof it === 'string' ? it : (it && (it.id || it.item_id))))
      .filter(Boolean);

    state.total = (searchResp.paging && typeof searchResp.paging.total === 'number') ? searchResp.paging.total : ids.length;

    if (!ids.length) { state.lastItems = []; state.loading = false; renderRows([]); return; }
    const items = await hydrate(ids);
    state.lastItems = items;
    state.loading = false;
    renderRows(items);
    loadVisitsForPage(ids);   // camada C — visitas 30d da página (assíncrono, enriquece depois)
  } catch (err) {
    // Fallback de busca por nome: se q= falhou, tenta sku= com aviso amigável.
    // NOTA: sku= NÃO foi validado (a conta de teste não usa SKU) — caminho defensivo.
    if (state.search && state.searchParam === 'q' && err.status && err.status >= 400 && err.status !== 401) {
      state.searchParam = 'sku';
      setBanner('warn', 'A busca por nome ainda não está disponível — mostrando resultados por código (SKU). Para o resultado exato, cole o ID do anúncio (ex.: MLB123456789).');
      return loadPage();
    }
    state.loading = false;
    renderError(err);
  }
}

// Extrai MLB/MLBU de um link ou ID colado (input único inteligente)
function parseItemId(text) {
  const s = (text || '').trim();
  if (!s) return null;
  let m = s.match(/MLBU-?(\d+)/i);        // UP (produto) primeiro — é superset de MLB
  if (m) return 'MLBU' + m[1];
  m = s.match(/\/p\/(MLB\d+)/i);          // catálogo /p/MLB...
  if (m) return m[1].toUpperCase();
  m = s.match(/MLB-?(\d+)/i);             // anúncio MLB...
  if (m) return 'MLB' + m[1];
  return null;
}
