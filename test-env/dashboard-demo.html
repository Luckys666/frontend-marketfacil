<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Dashboard Marketfacil — Demo (mock data)</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=DM+Mono:wght@400;500;700&family=DM+Sans:wght@400;500;600;700;800&display=swap" rel="stylesheet">
<link rel="stylesheet" href="../css/dashboard.css">
<script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.4/dist/chart.umd.min.js"></script>
<style>
  body { margin: 0; padding: 24px; background: #f4f6fa; font-family: 'DM Sans', system-ui, sans-serif; }
  .demo-bar {
    max-width: 1200px;
    margin: 0 auto 16px;
    padding: 12px 16px;
    background: #0f172a;
    color: #fff;
    border-radius: 10px;
    font-size: 0.85rem;
    display: flex;
    justify-content: space-between;
    align-items: center;
    flex-wrap: wrap;
    gap: 12px;
  }
  .demo-bar b { color: #00d68f; }
  .demo-bar select, .demo-bar button {
    background: rgba(255,255,255,0.1);
    color: #fff;
    border: 1px solid rgba(255,255,255,0.2);
    padding: 6px 10px;
    border-radius: 6px;
    font-family: inherit;
    font-size: 0.8rem;
    cursor: pointer;
  }
  #mfd-root { max-width: 1200px; margin: 0 auto; }
</style>
</head>
<body>

<div class="demo-bar">
  <span>🧪 <b>Demo local</b> — dados mockados (interceptamos fetch para os endpoints do mlb-proxy)</span>
  <div>
    <label>Cenário:
      <select id="scenario">
        <option value="healthy">Conta saudável (ROAS 5x)</option>
        <option value="critical">Conta com problemas (ROAS 0.8x)</option>
        <option value="empty">Conta nova (sem ads)</option>
        <option value="winning">Conta vencendo (ROAS 12x)</option>
        <option value="big">Conta grande (R$ 1.2M faturamento)</option>
        <option value="no-token">Onboarding: sem ML conectado</option>
        <option value="no-ads">Onboarding: ML conectado mas 0 anúncios</option>
      </select>
    </label>
    <button id="btnRecarregar">Recarregar</button>
    <button id="btnLimparStorage">Limpar localStorage</button>
  </div>
</div>

<div id="mfd-root">
  <div class="mfd-wrapper">
    <div class="mfd-loading">
      <div class="mfd-orbital">
        <div class="mfd-orbital-ring"></div>
        <div class="mfd-orbital-ring"></div>
        <div class="mfd-orbital-dot"></div>
      </div>
      <p class="mfd-loading-msg">Inicializando demo...</p>
      <div class="mfd-loading-bar"><div class="mfd-loading-bar-fill"></div></div>
    </div>
  </div>
</div>

<script>
// ── MOCK fetch interceptor ─────────────────────────────────────────────
const SCENARIOS = {
  healthy: {
    revenue: 18500, organic: 7400, cost: 1850, orders: 42, organic_orders: 18,
    impressions: 95000, clicks: 1700, paused: 2, active: 24, hasCampaigns: true
  },
  critical: {
    revenue: 1200, organic: 800, cost: 1500, orders: 4, organic_orders: 2,
    impressions: 32000, clicks: 410, paused: 6, active: 18, hasCampaigns: true
  },
  empty: {
    revenue: 0, organic: 920, cost: 0, orders: 0, organic_orders: 4,
    impressions: 0, clicks: 0, paused: 1, active: 7, hasCampaigns: false
  },
  winning: {
    revenue: 64000, organic: 22000, cost: 5100, orders: 180, organic_orders: 67,
    impressions: 320000, clicks: 6400, paused: 0, active: 38, hasCampaigns: true
  },
  big: {
    revenue: 880000, organic: 380000, cost: 42000, orders: 1850, organic_orders: 720,
    impressions: 4200000, clicks: 88000, paused: 5, active: 96, hasCampaigns: true
  },
  'no-token': {
    revenue: 0, organic: 0, cost: 0, orders: 0, organic_orders: 0,
    impressions: 0, clicks: 0, paused: 0, active: 0, hasCampaigns: false, noToken: true
  },
  'no-ads': {
    revenue: 0, organic: 0, cost: 0, orders: 0, organic_orders: 0,
    impressions: 0, clicks: 0, paused: 0, active: 0, hasCampaigns: false
  }
};

function buildAggregated(s) {
  const totalRev = s.revenue;
  const totalCost = s.cost;
  return {
    total_cost: totalCost,
    total_revenue: totalRev,
    organic_revenue: s.organic,
    total_clicks: s.clicks,
    total_impressions: s.impressions,
    total_orders: s.orders,
    organic_orders: s.organic_orders,
    avg_acos: totalRev > 0 ? (totalCost / totalRev) * 100 : 0,
    avg_tacos: (totalRev + s.organic) > 0 ? (totalCost / (totalRev + s.organic)) * 100 : 0,
    overall_roas: totalCost > 0 ? totalRev / totalCost : 0,
    avg_ctr: s.impressions > 0 ? (s.clicks / s.impressions) * 100 : 0,
    avg_cvr: s.clicks > 0 ? (s.orders / s.clicks) * 100 : 0,
    avg_cpc: s.clicks > 0 ? totalCost / s.clicks : 0,
    ads_sales_pct: (totalRev + s.organic) > 0 ? (totalRev / (totalRev + s.organic)) * 100 : 0
  };
}

function buildDaily(s) {
  const days = 30;
  const out = [];
  const today = new Date();
  for (let i = days - 1; i >= 0; i--) {
    const d = new Date(today);
    d.setDate(d.getDate() - i);
    const yyyy = d.getFullYear(), mm = String(d.getMonth()+1).padStart(2,'0'), dd = String(d.getDate()).padStart(2,'0');
    // ondas pra parecer real
    const wave = 0.6 + 0.4 * Math.sin((i / days) * Math.PI * 2);
    const noise = 0.85 + Math.random() * 0.3;
    out.push({
      date: `${yyyy}-${mm}-${dd}`,
      cost: (s.cost / days) * wave * noise,
      clicks: Math.round((s.clicks / days) * wave * noise),
      prints: Math.round((s.impressions / days) * wave * noise),
      total_amount: (s.revenue / days) * wave * noise,
      organic_units_amount: (s.organic / days) * wave * noise,
      units_quantity: Math.round((s.orders / days) * wave * noise),
      organic_units_quantity: Math.round((s.organic_orders / days) * wave * noise)
    });
  }
  return out;
}

const origFetch = window.fetch;
window.fetch = async function(url, opts) {
  const u = String(url);
  const scenarioName = document.getElementById('scenario')?.value || 'healthy';
  const s = SCENARIOS[scenarioName];

  if (u.includes('/api/ads-aggregated')) {
    return jsonResp({
      seller_id: 'demo123',
      seller_info: { id: 'demo123', nickname: 'DEMOSELLER' },
      site_id: 'MLB',
      advertiser_id: 'demoAdv',
      total_items_account: s.active,
      date_from: '2026-03-28',
      date_to: '2026-04-27',
      aggregated: buildAggregated(s),
      daily_aggregated: buildDaily(s),
      campaigns: s.hasCampaigns ? [
        { campaign_id: 'c1', name: 'Campanha Principal', status: 'active', strategy: 'profitability' },
        { campaign_id: 'c2', name: 'Campanha Verão', status: 'paused', strategy: 'visibility' }
      ] : []
    });
  }

  if (u.includes('/api/users/me')) {
    return jsonResp({
      id: 'demo123',
      first_name: 'Lucas',
      nickname: 'DEMOSELLER',
      seller_reputation: {
        level_id: '5_green',
        power_seller_status: 'platinum'
      }
    });
  }

  if (u.includes('/api/fetch-ads')) {
    const isPaused = u.includes('status=paused');
    const n = isPaused ? s.paused : s.active;
    // Gera N IDs falsos
    const results = Array.from({ length: Math.min(n, 100) }, (_, i) => ({ id: `MLB${1000000 + i}` }));
    return jsonResp({ paging: { total: n }, results });
  }

  if (u.includes('/users/') && u.includes('/brands')) {
    return jsonResp({ results: [{ id: 'BRAND1', name: 'DemoSeller Oficial', verified: true }] });
  }

  if (u.includes('/api/moderations/items')) {
    return jsonResp({
      seller_id: 'demo123',
      query: null,
      paging: { limit: 50, offset: 0, total: 4 },
      results: ['MLB3785926845', 'MLB1669552989', 'MLB3604206087', 'MLB2914582122']
    });
  }
  if (u.includes('/api/moderations/details')) {
    return jsonResp([{
      name: 'POOR_QUALITY_THUMBNAIL',
      id: '7123400815',
      date_created: '2026-05-10T10:47:05.270-0400',
      evidences: [{ section_name: 'pictures', text_matched: 'MLB3785926845-IMG01' }],
      wordings: [
        { type: 'REASON', value: 'A foto principal está com qualidade baixa. Sua publicação está perdendo exposição.' },
        { type: 'REMEDY', value: 'Suba uma foto com 1200×1200 ou 1200×1540, boa iluminação, sem texto ou marca d\'água sobreposta, pra reativar a exposição.' }
      ]
    }]);
  }

  if (u.includes('/api/slot')) {
    // Mock: 7 anúncios em estado warning
    const slots = ['MLB3785926845','MLB1669552989','MLB3604206087','MLB2914582122','MLB3001234567','MLB4002233445','MLB5009988776'];
    return jsonResp({
      slots,
      result: {
        id: 'MLB3785926845',
        name: 'Camiseta básica branca masculina 100% algodão',
        problem: 'Qualidade da imagem principal abaixo do esperado',
        solution: 'Suba uma foto com 1200x1200 ou 1200x1540, boa iluminação e produto centralizado pra remover a penalização',
        status: 'warning',
        url: 'https://app.marketfacil.com.br/analise-anuncio?item=MLB3785926845',
        score: 38,
        level: 'medium'
      },
      // Novo (?details=N): motivos por anúncio nas palavras do ML
      details: [
        {
          id: 'MLB3785926845', title: 'Camiseta básica branca masculina 100% algodão', status: 'warning', catalog: false,
          reasons: [
            { title: 'Qualidade da imagem principal abaixo do esperado', tip: 'Suba uma foto com 1200x1200, boa iluminação e produto centralizado', bucket: 'Fotos' },
            { title: 'Complete as características do produto', tip: null, bucket: 'Ficha técnica' }
          ]
        },
        {
          id: 'MLB1669552989', title: 'Tênis esportivo masculino corrida leve', status: 'unhealthy', catalog: false,
          reasons: [
            { title: 'Complete a ficha técnica com marca e modelo', tip: 'Anúncios com ficha completa aparecem em mais buscas', bucket: 'Ficha técnica' }
          ]
        },
        {
          id: 'MLB3604206087', title: 'Kit 3 panos de prato estampados', status: 'warning', catalog: true,
          reasons: []
        },
        {
          id: 'MLB2914582122', title: 'Garrafa térmica inox 1 litro', status: 'warning', catalog: false,
          reasons: [
            { title: 'Adicione uma descrição ao anúncio', tip: 'Descrições completas reduzem perguntas e devoluções', bucket: 'Descrição' }
          ]
        }
      ]
    });
  }

  if (u.includes('/api/ads-items')) {
    // Top anúncios em campanha (lista usada pelos cards "Melhores anúncios" e reviews)
    if (!s.hasCampaigns) return jsonResp({ items: [] });
    const mk = (i, title, cost, revenue, organic) => ({
      item_id: `MLB${4000000 + i}`,
      title,
      thumbnail: '',
      permalink: 'https://produto.mercadolivre.com.br/MLB-' + (4000000 + i),
      catalog_listing: i % 2 === 0,
      current_level: null,
      cost, revenue, organic_revenue: organic,
      roas: cost > 0 ? revenue / cost : 0,
      tacos: (revenue + organic) > 0 ? (cost / (revenue + organic)) * 100 : 0,
      ctr: 1.2 + i * 0.3, cvr: 2.5 + i * 0.8,
      orders: 10 + i * 7, clicks: 300 + i * 120, impressions: 22000 + i * 9000
    });
    return jsonResp({ items: [
      mk(1, 'Camiseta básica branca masculina 100% algodão premium', s.cost * 0.30, s.revenue * 0.28, s.organic * 0.2),
      mk(2, 'Kit 3 poleiras adesivas multiuso banheiro cozinha inox', s.cost * 0.24, s.revenue * 0.22, s.organic * 0.15),
      mk(3, 'Fone bluetooth sem fio com cancelamento de ruído', s.cost * 0.18, s.revenue * 0.2, s.organic * 0.12),
      mk(4, 'Garrafa térmica inox 1 litro 12h quente gelado', s.cost * 0.12, s.revenue * 0.1, s.organic * 0.1),
      mk(5, 'Organizador de gavetas modular 12 nichos dobrável', s.cost * 0.08, s.revenue * 0.06, s.organic * 0.05)
    ] });
  }

  if (u.includes('/api/fetch-reviews')) {
    const idm = u.match(/item_id=([^&]+)/);
    const iid = idm ? decodeURIComponent(idm[1]) : 'MLB0';
    const n = parseInt(iid.slice(-1), 10) || 1;
    const reviews = Array.from({ length: Math.min(n + 1, 4) }, (_, i) => ({
      rate: 5 - (i % 2),
      title: i === 0 ? 'Excelente' : 'Muito bom',
      content: i === 0 ? 'Produto de ótima qualidade, chegou rápido e bem embalado. Recomendo!' : 'Atendeu bem, voltaria a comprar.',
      date_created: `2026-0${5 + (i % 2)}-1${i}T10:00:00.000Z`
    }));
    return jsonResp({
      rating_average: 4.6,
      paging: { total: n * 7 + 1 },
      rating_levels: null,
      reviews
    });
  }

  if (u.includes('/api/fetch-visits?')) {
    // Mock: time-series diário de visitas (1 item)
    const today = new Date();
    const days = 30;
    const results = [];
    for (let i = days - 1; i >= 0; i--) {
      const d = new Date(today);
      d.setDate(d.getDate() - i);
      const yyyy = d.getFullYear(), mm = String(d.getMonth()+1).padStart(2,'0'), dd = String(d.getDate()).padStart(2,'0');
      results.push({ date: `${yyyy}-${mm}-${dd}T00:00:00.000Z`, total: 8 + Math.round(Math.random() * 15) });
    }
    return jsonResp({ total_visits: results.reduce((s,r)=>s+r.total,0), results });
  }

  if (u.includes('/api/fetch-visits-bulk')) {
    // Simula visitas: 1.500-3.500 por item no período (mais realista pra qualquer tamanho de conta)
    const idsMatch = u.match(/items=([^&]+)/);
    const ids = idsMatch ? decodeURIComponent(idsMatch[1]).split(',') : [];
    const out = {};
    ids.forEach((id, i) => {
      const v = Math.round(1500 + (i % 10) * 200);
      out[id] = { total_visits: v };
    });
    return jsonResp(out);
  }

  return origFetch(url, opts);
};

function jsonResp(payload) {
  return Promise.resolve({
    ok: true,
    status: 200,
    json: () => Promise.resolve(payload)
  });
}

// ── Wire UI ──
document.getElementById('btnRecarregar').addEventListener('click', () => {
  if (window.MFD_refresh) window.MFD_refresh();
});
document.getElementById('btnLimparStorage').addEventListener('click', () => {
  Object.keys(localStorage).filter(k => k.startsWith('mf_dash_') || k.startsWith('mf_adp_')).forEach(k => localStorage.removeItem(k));
  location.reload();
});
document.getElementById('scenario').addEventListener('change', (e) => {
  // Cenários onboarding precisam reload pq mexem em token/dados
  localStorage.setItem('demo_scenario', e.target.value);
  location.reload();
});

// Tool clicks: só logar (não navega no demo)
window.MFD_onToolClick = function(tool, ctx) {
  alert('Tool: ' + tool + ' (no demo só logamos — o Bubble vai navegar pra página real)');
  console.log('Tool click:', tool, ctx);
};
</script>

<!-- Carrega o dashboard real depois dos mocks pra interceptar fetch corretamente -->
<script src="../js/dashboard.js"></script>

<script>
// Restaura cenário escolhido (se houver) e dispara boot apropriado
const saved = localStorage.getItem('demo_scenario');
if (saved) document.getElementById('scenario').value = saved;
const initialScenario = document.getElementById('scenario').value;
const initToken = (initialScenario === 'no-token') ? null : 'fake-demo-token';
window.MFD_init({ token: initToken, sellerId: 'demo123', container: 'mfd-root' });
</script>

</body>
</html>
