<style>
/* ============================================================
   Design Tokens — Proposta U (Light Trading)
   ============================================================ */
:root {
  --bg:           #f4f6fa;
  --bg-card:      #ffffff;
  --navy:         #0f172a;
  --blue:         #0066ff;
  --blue-light:   #e8f0ff;
  --green:        #00d68f;
  --green-dark:   #059669;
  --red:          #ff3b5c;
  --red-dark:     #dc2626;
  --border:       #e2e8f0;
  --text:         #0f172a;
  --text-secondary: #475569;
  --text-muted:   #94a3b8;
  --radius-card:  10px;
  --radius-btn:   6px;
  --shadow-sm:    0 1px 3px rgba(0,0,0,.06);
  --shadow-md:    0 4px 12px rgba(0,0,0,.08);
  --font-ui:      'Geist', -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
  --font-mono:    'Geist Mono', 'Consolas', 'Courier New', monospace;
}

/* ── Reset & Base ──────────────────────────────────────────── */
#analisadorCatalogoApp,
#analisadorCatalogoApp * {
  box-sizing: border-box;
  font-family: var(--font-ui);
}

#analisadorCatalogoApp {
  background: var(--bg);
  padding: 16px;
  min-height: 200px;
  position: relative;
}

/* ── Top Progress Bar ───────────────────────────────────────── */
.ac-top-progress-bar {
  position: fixed;
  top: 0;
  left: 0;
  right: 0;
  height: 3px;
  z-index: 9999;
  background: var(--border);
  display: none; /* shown by script via .ac-loading-active on #analisadorCatalogoApp */
  overflow: hidden;
}

.ac-top-progress-bar.ac-progress-visible {
  display: block;
}

.ac-top-progress-fill {
  height: 100%;
  width: 0%;
  background: linear-gradient(90deg, var(--blue), var(--green));
  border-radius: 0 2px 2px 0;
  transition: width .6s ease;
  position: relative;
}

/* shimmer sweep */
.ac-top-progress-fill::after {
  content: '';
  position: absolute;
  inset: 0;
  background: linear-gradient(90deg, transparent, rgba(255,255,255,.45), transparent);
  animation: ac-shimmer-sweep 1.4s linear infinite;
}

@keyframes ac-shimmer-sweep {
  0%   { transform: translateX(-200%); }
  100% { transform: translateX(200%); }
}

/* ── Search Card ────────────────────────────────────────────── */
.ac-search-card {
  background: var(--bg-card);
  border: 1px solid var(--border);
  border-radius: var(--radius-card);
  box-shadow: var(--shadow-sm);
  padding: 20px 22px;
  margin-bottom: 18px;
}

.ac-search-card-title {
  font-size: .75rem;
  font-weight: 700;
  color: var(--text-muted);
  text-transform: uppercase;
  letter-spacing: .07em;
  margin: 0 0 12px;
}

.ac-search-row {
  display: flex;
  gap: 10px;
  align-items: center;
  flex-wrap: wrap;
}

.ac-search-input-wrap {
  flex: 1;
  min-width: 220px;
  position: relative;
  display: flex;
  align-items: center;
}

.ac-search-icon {
  position: absolute;
  left: 12px;
  color: var(--text-muted);
  font-size: .95rem;
  pointer-events: none;
  line-height: 1;
}

/* The real input — id used by script */
#ac-search-input {
  width: 100%;
  height: 44px;
  padding: 0 14px 0 44px;
  border: 1.5px solid var(--border);
  border-radius: var(--radius-btn);
  font-family: var(--font-ui);
  font-size: .95rem;
  color: var(--text);
  background: var(--bg-card);
  outline: none;
  transition: border-color .15s, box-shadow .15s;
}

#ac-search-input::placeholder {
  color: var(--text-muted);
}

#ac-search-input:focus {
  border-color: var(--blue);
  box-shadow: 0 0 0 3px rgba(0, 102, 255, .1);
}

/* Search button */
#ac-search-button {
  height: 44px;
  padding: 0 26px;
  border: none;
  border-radius: var(--radius-btn);
  background: var(--blue);
  color: #fff;
  font-family: var(--font-ui);
  font-weight: 700;
  font-size: .9rem;
  cursor: pointer;
  white-space: nowrap;
  transition: background .15s, transform .12s, box-shadow .15s;
  box-shadow: 0 2px 8px rgba(0, 102, 255, .25);
  display: flex;
  align-items: center;
  gap: 6px;
  flex-shrink: 0;
}

#ac-search-button:hover {
  background: #0052cc;
  transform: translateY(-1px);
  box-shadow: 0 4px 14px rgba(0, 102, 255, .35);
}

#ac-search-button:active {
  transform: translateY(0);
}

#ac-search-button:disabled {
  opacity: .55;
  cursor: not-allowed;
  transform: none;
}

/* ── Filters Card ──────────────────────────────────────────── */
.ac-filters-card {
  background: var(--bg-card);
  border: 1px solid var(--border);
  border-radius: var(--radius-card);
  box-shadow: var(--shadow-sm);
  padding: 16px 20px;
  margin-bottom: 18px;
  display: flex;
  flex-direction: column;
  gap: 12px;
}

.ac-extra-filters {
  display: flex;
  gap: 20px;
  flex-wrap: wrap;
  padding-top: 10px;
  border-top: 1px solid var(--border);
}

.ac-filter-group {
  display: flex;
  flex-direction: column;
  gap: 6px;
}

/* ── Logistic Filter — Toggle Buttons ───────────────────────── */
#ac-logistic-filter-container {
  margin-bottom: 0;
}

.ac-filter-label {
  font-size: .72rem;
  font-weight: 700;
  color: var(--text-muted);
  text-transform: uppercase;
  letter-spacing: .07em;
  margin-bottom: 8px;
  display: block;
}

.ac-filter-toggles {
  display: flex;
  flex-wrap: wrap;
  gap: 6px;
}

.ac-filter-btn {
  height: 34px;
  padding: 0 14px;
  border: 1px solid var(--border);
  border-radius: var(--radius-btn);
  background: var(--bg-card);
  color: var(--text-secondary);
  font-family: var(--font-ui);
  font-size: .82rem;
  font-weight: 500;
  cursor: pointer;
  white-space: nowrap;
  transition: all .14s;
  display: inline-flex;
  align-items: center;
  gap: 4px;
}

.ac-filter-btn:hover {
  border-color: var(--blue);
  color: var(--blue);
  background: var(--blue-light);
}

.ac-filter-btn.ac-active {
  background: var(--blue);
  color: #fff;
  border-color: var(--blue);
  box-shadow: 0 2px 8px rgba(0, 102, 255, .25);
}

.ac-filter-btn.ac-active:hover {
  background: #0052cc;
}

/* The hidden native select (kept for script compatibility) */
#ac-logistic-filter {
  display: none !important;
}

/* ── Results Container ──────────────────────────────────────── */
#ac-results {
  min-height: 80px;
}

/* ── Message States ─────────────────────────────────────────── */
.ac-loading-message,
.ac-info-message,
.ac-error-message {
  display: flex;
  flex-direction: column;
  align-items: center;
  justify-content: center;
  padding: 52px 24px 40px;
  gap: 14px;
  background: var(--bg-card);
  border: 1px solid var(--border);
  border-radius: var(--radius-card);
  box-shadow: var(--shadow-sm);
  text-align: center;
}

.ac-loading-message .ac-spinner {
  position: relative;
  width: 52px;
  height: 52px;
}

.ac-spinner-ring {
  position: absolute;
  inset: 0;
  border-radius: 50%;
  border: 3px solid transparent;
}

.ac-spinner-ring:nth-child(1) {
  border-top-color: var(--blue);
  border-right-color: var(--blue);
  animation: ac-spin .75s linear infinite;
}

.ac-spinner-ring:nth-child(2) {
  inset: 10px;
  border-bottom-color: var(--green);
  border-left-color: var(--green);
  animation: ac-spin 1.1s linear infinite reverse;
}

.ac-spinner-dot {
  position: absolute;
  top: 50%;
  left: 50%;
  transform: translate(-50%, -50%);
  width: 8px;
  height: 8px;
  border-radius: 50%;
  background: var(--blue);
  animation: ac-pulse 1.2s ease-in-out infinite;
}

@keyframes ac-spin  { to { transform: rotate(360deg); } }
@keyframes ac-pulse {
  0%, 100% { transform: translate(-50%,-50%) scale(.7); opacity: .4; }
  50%       { transform: translate(-50%,-50%) scale(1);  opacity: 1; }
}

.ac-loading-message p,
.ac-info-message p {
  font-size: .95rem;
  font-weight: 600;
  color: var(--text);
  margin: 0;
}

.ac-loading-message small,
.ac-info-message small {
  font-size: .82rem;
  color: var(--text-secondary);
  margin: 0;
}

.ac-error-message {
  border-color: #fecdd3;
  background: #fff5f5;
}

.ac-error-message .ac-error-icon {
  font-size: 2.2rem;
  line-height: 1;
}

.ac-error-message p {
  font-size: .95rem;
  font-weight: 700;
  color: var(--red-dark);
  margin: 0;
}

.ac-error-message small {
  font-size: .85rem;
  color: var(--text-secondary);
  max-width: 360px;
  line-height: 1.5;
  margin: 0;
}

/* ── Catalog Item Cards ─────────────────────────────────────── */
.ac-catalog-item {
  background: var(--bg-card);
  border: 1px solid var(--border);
  border-radius: var(--radius-card);
  box-shadow: var(--shadow-sm);
  margin-bottom: 14px;
  overflow: hidden;
  display: flex;
  gap: 0;
  transition: box-shadow .15s;
}

.ac-catalog-item:hover {
  box-shadow: var(--shadow-md);
}

.ac-catalog-image-container {
  flex-shrink: 0;
  width: 100px;
  background: #f8fafc;
  border-right: 1px solid var(--border);
  display: flex;
  align-items: center;
  justify-content: center;
  padding: 14px;
}

.ac-catalog-image {
  width: 72px;
  height: 72px;
  object-fit: cover;
  border-radius: 8px;
  border: 1px solid var(--border);
}

.ac-catalog-details {
  flex: 1;
  padding: 16px 18px;
  min-width: 0;
  display: flex;
  flex-direction: column;
  gap: 8px;
}

.ac-catalog-title {
  font-size: .98rem;
  font-weight: 600;
  color: var(--text);
  text-decoration: none;
  line-height: 1.35;
  display: block;
}

.ac-catalog-title:hover { color: var(--blue); }

.ac-catalog-meta {
  display: flex;
  gap: 8px;
  align-items: center;
  flex-wrap: wrap;
  font-size: .83rem;
  color: var(--text-secondary);
}

.ac-catalog-id {
  font-family: var(--font-mono);
  font-size: .76rem;
  color: var(--blue);
  background: var(--blue-light);
  padding: 2px 8px;
  border-radius: 4px;
  font-weight: 500;
}

.ac-catalog-chart-container {
  flex-shrink: 0;
  width: 220px;
  padding: 12px;
  border-left: 1px solid var(--border);
  background: #f8fafc;
  display: flex;
  align-items: center;
  justify-content: center;
}

.ac-catalog-chart-container canvas {
  max-width: 100%;
}

/* ── Top Competitors Section ────────────────────────────────── */
.ac-top-competitors-section {
  margin-top: 10px;
  padding-top: 10px;
  border-top: 1px solid var(--border);
}

.ac-top-competitors-label {
  font-size: .72rem;
  font-weight: 700;
  text-transform: uppercase;
  letter-spacing: .07em;
  color: var(--text-muted);
  margin-bottom: 6px;
}

.ac-competitor-entry {
  display: flex;
  align-items: center;
  gap: 8px;
  padding: 6px 0;
  border-bottom: 1px solid #f1f5f9;
  font-size: .875rem;
  color: var(--text);
}

.ac-competitor-entry:last-child { border-bottom: none; }

.ac-competitor-rank {
  font-family: var(--font-mono);
  font-size: .75rem;
  font-weight: 700;
  color: var(--text-muted);
  width: 22px;
  flex-shrink: 0;
  text-align: center;
}

.ac-competitor-name {
  flex: 1;
  min-width: 0;
  font-weight: 500;
  white-space: nowrap;
  overflow: hidden;
  text-overflow: ellipsis;
}

.ac-competitor-price {
  font-family: var(--font-mono);
  font-size: .88rem;
  font-weight: 600;
  color: var(--text);
  flex-shrink: 0;
}

/* ── Announce Button ────────────────────────────────────────── */
.ac-announce-button {
  display: inline-flex;
  align-items: center;
  gap: 6px;
  height: 36px;
  padding: 0 18px;
  border-radius: var(--radius-btn);
  background: var(--green-dark);
  color: #fff;
  font-family: var(--font-ui);
  font-weight: 700;
  font-size: .83rem;
  border: none;
  cursor: pointer;
  transition: background .14s, transform .12s, box-shadow .14s;
  text-decoration: none;
  box-shadow: 0 2px 8px rgba(5, 150, 105, .22);
}

.ac-announce-button:hover {
  background: #047857;
  transform: translateY(-1px);
  box-shadow: 0 4px 12px rgba(5, 150, 105, .32);
  color: #fff;
  text-decoration: none;
}

/* ── Pagination Controls ────────────────────────────────────── */
#ac-pagination-controls {
  display: flex;
  align-items: center;
  justify-content: space-between;
  flex-wrap: wrap;
  gap: 10px;
  background: var(--bg-card);
  border: 1px solid var(--border);
  border-radius: var(--radius-card);
  padding: 12px 18px;
  box-shadow: var(--shadow-sm);
  margin-top: 16px;
}

.ac-pagination-info {
  font-size: .85rem;
  color: var(--text-secondary);
}

.ac-pagination-info strong {
  color: var(--text);
  font-family: var(--font-mono);
}

.ac-page-buttons {
  display: flex;
  gap: 4px;
  flex-wrap: wrap;
}

/* Individual page numbers generated by script */
.ac-page-number {
  width: 36px;
  height: 36px;
  display: inline-flex;
  align-items: center;
  justify-content: center;
  border-radius: var(--radius-btn);
  border: 1px solid var(--border);
  background: var(--bg-card);
  font-family: var(--font-mono);
  font-size: .83rem;
  color: var(--text-secondary);
  cursor: pointer;
  transition: all .12s;
  user-select: none;
}

.ac-page-number:hover {
  border-color: var(--blue);
  color: var(--blue);
}

.ac-page-number.ac-current {
  background: var(--blue);
  color: #fff;
  border-color: var(--blue);
  font-weight: 700;
  box-shadow: 0 2px 8px rgba(0, 102, 255, .28);
}

.ac-page-number:disabled,
.ac-page-number[disabled] {
  opacity: .35;
  cursor: default;
  pointer-events: none;
}

.ac-logistica-coleta,
.ac-logistica-places,
.ac-logistica-full,
.ac-logistica-correios,
.ac-logistica-me1,

.ac-logistica-full        { background: var(--blue-light); color: var(--blue); }
.ac-logistica-coleta      { background: #fef3c7; color: #92400e; }

.ac-logistica-me1,

.ac-beneficio {

  font-size: .72rem;

/* ── Skeleton / Loading States ──────────────────────────────── */
.ac-skeleton-card {
  background: var(--bg-card);
  border: 1px solid var(--border);

}

.ac-skel-thumb {

.ac-skel-line {

.ac-skel-line:nth-child(1) { width: 70%; }

<!-- ── Toggle Buttons ↔ Hidden Select Sync ──────────────────── -->
<!-- Inline script (not a Bubble script element — just progressive enhancement for the filter UI) -->
<script>
(function () {
  if (window.__acFilterSyncLoaded) return;
  window.__acFilterSyncLoaded = true;

  /* Logistic toggles → hidden select */
  var logContainer = document.getElementById('ac-logistic-toggles');
  var logSelect = document.getElementById('ac-logistic-filter');
  if (logContainer && logSelect) {
    logContainer.addEventListener('click', function (e) {
      var btn = e.target.closest('.ac-filter-btn');
      if (!btn) return;
      logContainer.querySelectorAll('.ac-filter-btn').forEach(function (b) { b.classList.remove('ac-active'); });
      btn.classList.add('ac-active');
      logSelect.value = btn.getAttribute('data-value');
      logSelect.dispatchEvent(new Event('change', { bubbles: true }));
    });
  }

  /* Generic toggle groups (frete, competitors, sort) */
  ['ac-frete-toggles', 'ac-competitors-toggles', 'ac-sort-toggles'].forEach(function (groupId) {
    var group = document.getElementById(groupId);
    if (!group) return;
    group.addEventListener('click', function (e) {
      var btn = e.target.closest('.ac-filter-btn');
      if (!btn) return;
      group.querySelectorAll('.ac-filter-btn').forEach(function (b) { b.classList.remove('ac-active'); });
      btn.classList.add('ac-active');
      /* Dispatch custom event so script can react */
      document.dispatchEvent(new CustomEvent('ac-filter-change', {
        detail: { filter: btn.getAttribute('data-filter'), value: btn.getAttribute('data-value') }
      }));
    });
  });
})();
</script>
