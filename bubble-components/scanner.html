<!-- CSS do Widget -->
<link rel="stylesheet" href="https://cdn.jsdelivr.net/gh/Luckys666/frontend-marketfacil@a435e6f22a2b639c6686a6463b850be74fa6dc83/css/core.css">
<link rel="stylesheet" href="https://cdn.jsdelivr.net/gh/Luckys666/frontend-marketfacil@a435e6f22a2b639c6686a6463b850be74fa6dc83/css/analyzer.css">
<link rel="stylesheet" href="https://cdn.jsdelivr.net/gh/Luckys666/frontend-marketfacil@a435e6f22a2b639c6686a6463b850be74fa6dc83/css/scanner.css">

<!-- COMPONENT WRAPPER -->
<div class="mf-dashboard-wrapper">
    <div class="ml-analyzer-widget">

        <!-- A14: heading-landmark p/ leitores de tela. O titulo visivel hoje e um Text do Bubble. -->
        <h2 class="sr-only">Auditoria de Tags</h2>

        <!--
          HEADER DA FEATURE (ATIVAVEL) — descomente p/ trazer o titulo pro componente e controla-lo via CSS.
          Se ativar: (1) o orquestrador deve OCULTAR no Bubble o Text "Auditoria de Tags" (evita duplicar);
          (2) remova o <h2 class="sr-only"> acima (evita heading duplicado no leitor de tela).
        <div class="sc-header">
            <h2 class="sc-title-main">Auditoria de Tags</h2>
            <p class="sc-subtitle">Escaneie sua conta e veja anuncios com problemas de qualidade de foto, ficha tecnica incompleta ou penalidade.</p>
        </div>
        -->

        <!-- Controls -->
        <div class="sc-controls">
            <div class="sc-control-field">
                <label for="tagFilter" class="sc-label">Filtrar por Tag:</label>
                <select id="tagFilter" onchange="handleScannerFilterChange()">
                    <option value="all">Ver Tudo (Inicie o Scanner)</option>
                </select>
            </div>
            <div class="sc-actions">
                <button id="scanButton" onclick="startAccountScan()">Escanear Conta</button>
                <button id="exportCsvButton" onclick="exportToCSV()"
                    title="Gerar planilha com todos os anuncios e problemas encontrados"><span aria-hidden="true">📊</span> Exportar Relatório</button>
            </div>
        </div>

        <!-- Progress Bar -->
        <div id="scanProgress" style="display: none;">
            <div class="sc-status-row" role="status" aria-live="polite" aria-atomic="true">
                <span id="scanStatusText">Iniciando...</span>
                <span id="scanCountText">0 encontrados</span>
            </div>
            <div class="sc-progress-bar-track" role="progressbar" aria-valuemin="0" aria-valuemax="100" aria-label="Progresso da varredura">
                <div id="scanProgressBar" style="width: 0%;"></div>
            </div>
        </div>

        <!-- Tag Legend -->
        <div id="tagLegend" style="display: none;">
            <span class="legend-label">Legenda</span>
            <span class="legend-item"><span class="legend-dot problem"></span> Problema — precisa de atenção</span>
            <span class="legend-item"><span class="legend-dot positive"></span> Positiva — vantagem do anúncio</span>
            <span class="legend-item"><span class="legend-dot neutral"></span> Neutra — informação sem impacto</span>
        </div>

        <!-- Results Area -->
        <div id="scannerResults" class="sc-results-grid" role="list">
            <div class="initial-placeholder">
                Selecione um filtro e clique em "Escanear Conta" para começar.
            </div>
        </div>

        <!-- Pagination Controls -->
        <nav id="scannerPagination" style="display: none;" aria-label="Paginação dos resultados"></nav>
    </div>
</div>

<!-- JS do Widget (carregado via jsDelivr CDN) -->
<script src="https://cdn.jsdelivr.net/gh/Luckys666/frontend-marketfacil@a435e6f22a2b639c6686a6463b850be74fa6dc83/js/analyzer.js"></script>
<script src="https://cdn.jsdelivr.net/gh/Luckys666/frontend-marketfacil@a435e6f22a2b639c6686a6463b850be74fa6dc83/js/scanner.js"></script>
